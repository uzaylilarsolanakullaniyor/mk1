<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>macOS Web</title>
<style>
/* ============================================================
   macOS Web — single-file desktop simulation
   Sections: base / boot / menubar / desktop / windows / dock /
   finder / terminal / browser / music / settings / misc
   ============================================================ */

/* ---------- Base & theme variables ---------- */
:root{
  --accent:#0a84ff;
  --accent-soft:rgba(10,132,255,.18);
  --menubar-bg:rgba(255,255,255,.55);
  --menu-bg:rgba(248,248,250,.82);
  --text:#1d1d1f;
  --text-sec:rgba(60,60,67,.6);
  --window-bg:rgba(243,243,246,.86);
  --titlebar:rgba(232,232,236,.6);
  --sidebar-bg:rgba(236,236,240,.55);
  --content-bg:#ffffff;
  --content-bg2:#f5f5f7;
  --border:rgba(0,0,0,.12);
  --hover:rgba(0,0,0,.06);
  --dock-bg:rgba(255,255,255,.32);
  --dock-border:rgba(255,255,255,.4);
  --notif-bg:rgba(250,250,252,.85);
  --shadow-win:0 24px 70px rgba(0,0,0,.38), 0 4px 16px rgba(0,0,0,.18);
  --shadow-win-dim:0 12px 36px rgba(0,0,0,.22);
}
body.dark{
  --menubar-bg:rgba(28,28,32,.6);
  --menu-bg:rgba(40,40,46,.85);
  --text:#f5f5f7;
  --text-sec:rgba(235,235,245,.55);
  --window-bg:rgba(38,38,44,.82);
  --titlebar:rgba(52,52,58,.55);
  --sidebar-bg:rgba(44,44,50,.5);
  --content-bg:#1e1e23;
  --content-bg2:#26262c;
  --border:rgba(255,255,255,.14);
  --hover:rgba(255,255,255,.08);
  --dock-bg:rgba(40,40,46,.42);
  --dock-border:rgba(255,255,255,.16);
  --notif-bg:rgba(46,46,52,.88);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue","Segoe UI",Roboto,sans-serif;
  color:var(--text);
  background:#000;
  user-select:none;
  -webkit-user-select:none;
}
button{font-family:inherit;color:inherit;background:none;border:none;cursor:pointer}
input,textarea{font-family:inherit}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:rgba(127,127,127,.45);border-radius:5px;border:2px solid transparent;background-clip:content-box}
::-webkit-scrollbar-track{background:transparent}
svg{display:block}

/* ---------- Boot screen ---------- */
#boot{
  position:fixed;inset:0;z-index:11000;background:#000;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:60px;
  transition:opacity .8s ease;
}
#boot.done{opacity:0;pointer-events:none}
#boot .boot-logo{width:78px;opacity:0;animation:bootLogo 1s ease forwards}
@keyframes bootLogo{to{opacity:1}}
#boot-bar{width:230px;height:5px;border-radius:3px;background:rgba(255,255,255,.22);overflow:hidden;opacity:0;animation:bootLogo .8s .4s ease forwards}
#boot-fill{width:0%;height:100%;border-radius:3px;background:#fff;transition:width .25s ease}

/* Desktop fades/zooms in after boot */
#environment{position:fixed;inset:0;opacity:0;transform:scale(1.04);transition:opacity .9s ease,transform 1.1s ease}
body.on #environment{opacity:1;transform:scale(1)}

/* ---------- Wallpaper ---------- */
#wallpaper{position:absolute;inset:0;z-index:0;background:#234;transition:background .4s ease}

/* ---------- Menu bar ---------- */
#menubar{
  position:absolute;top:0;left:0;right:0;height:28px;z-index:6000;
  display:flex;align-items:center;justify-content:space-between;padding:0 12px;
  background:var(--menubar-bg);
  backdrop-filter:blur(28px) saturate(1.6);-webkit-backdrop-filter:blur(28px) saturate(1.6);
  font-size:13px;
  box-shadow:0 1px 0 rgba(0,0,0,.08);
}
.mb-side{display:flex;align-items:center;height:100%}
.mb-item{
  display:flex;align-items:center;gap:5px;height:22px;padding:0 9px;border-radius:5px;
  white-space:nowrap;cursor:default;position:relative;
}
.mb-item svg{width:15px;height:15px;fill:var(--text)}
.mb-item:hover,.mb-item.open{background:var(--hover)}
.mb-item.open{background:var(--accent);color:#fff}
.mb-item.open svg{fill:#fff}
#mb-app{font-weight:700}
#mb-clock{font-weight:500;letter-spacing:.2px}
.mb-status svg{width:17px;height:17px}
.mb-status.muted svg{opacity:.4}

/* Dropdown menus (menubar + context share styling) */
.menu-pop,.ctxmenu{
  position:fixed;z-index:9000;min-width:210px;padding:5px;
  background:var(--menu-bg);
  backdrop-filter:blur(30px) saturate(1.7);-webkit-backdrop-filter:blur(30px) saturate(1.7);
  border-radius:10px;border:.5px solid var(--border);
  box-shadow:0 14px 44px rgba(0,0,0,.3);
  font-size:13px;
  animation:menuIn .12s ease;
}
@keyframes menuIn{from{opacity:0;transform:scale(.97)}}
.ctx-item{
  display:flex;justify-content:space-between;align-items:center;gap:24px;
  padding:4px 12px;border-radius:6px;cursor:default;white-space:nowrap;
}
.ctx-item:hover{background:var(--accent);color:#fff}
.ctx-item.disabled{opacity:.38;pointer-events:none}
.ctx-item.danger:hover{background:#ff453a}
.ctx-item .kbd{font-size:12px;opacity:.55}
.ctx-sep{height:1px;background:var(--border);margin:5px 10px}

/* ---------- Desktop icons ---------- */
#desktop{position:absolute;top:28px;left:0;right:0;bottom:0;z-index:1}
.dicon{
  position:absolute;width:86px;display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:6px 2px;border-radius:8px;cursor:default;
}
.dicon-img{width:52px;height:52px;padding:3px;border-radius:10px}
.dicon-img svg{width:100%;height:100%;filter:drop-shadow(0 2px 4px rgba(0,0,0,.35))}
.dicon-label{
  font-size:11.5px;line-height:1.25;text-align:center;color:#fff;border-radius:4px;padding:1px 6px;
  text-shadow:0 1px 3px rgba(0,0,0,.8);word-break:break-word;max-width:86px;
}
.dicon.selected .dicon-img{background:rgba(127,127,127,.32)}
.dicon.selected .dicon-label{background:var(--accent);text-shadow:none}
.dicon-label input{
  width:80px;font-size:11.5px;text-align:center;border:1.5px solid var(--accent);border-radius:4px;
  outline:none;background:var(--content-bg);color:var(--text);
}

/* ---------- Windows ---------- */
#windows{position:absolute;inset:0;z-index:5;pointer-events:none}
.window{
  position:absolute;display:flex;flex-direction:column;pointer-events:auto;
  background:var(--window-bg);
  backdrop-filter:blur(36px) saturate(1.6);-webkit-backdrop-filter:blur(36px) saturate(1.6);
  border-radius:12px;overflow:hidden;
  border:.5px solid var(--border);
  box-shadow:var(--shadow-win-dim);
}
.window.focused{box-shadow:var(--shadow-win)}
.window.opening{animation:winOpen .3s cubic-bezier(.2,.9,.35,1.15)}
@keyframes winOpen{from{transform:scale(.88);opacity:0}}
.window.closing{animation:winClose .18s ease forwards;pointer-events:none}
@keyframes winClose{to{transform:scale(.88);opacity:0}}
.window.minimizing{transition:transform .42s cubic-bezier(.5,.05,.8,.4),opacity .42s ease}
.window.minimized{display:none}
.window.animating{transition:left .32s ease,top .32s ease,width .32s ease,height .32s ease}

.titlebar{
  flex:none;height:40px;display:flex;align-items:center;gap:8px;padding:0 12px;
  background:var(--titlebar);box-shadow:0 .5px 0 var(--border);cursor:default;
}
.win-title{
  flex:1;text-align:center;font-size:13px;font-weight:600;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  margin-right:52px; /* visually balance traffic lights */
}
.window:not(.focused) .win-title{opacity:.45}
.win-body{flex:1;display:flex;min-height:0;position:relative}

/* Traffic lights */
.traffic{display:flex;gap:8px;flex:none}
.tl{width:12px;height:12px;border-radius:50%;position:relative;padding:0;box-shadow:inset 0 0 0 .5px rgba(0,0,0,.18)}
.t-close{background:#ff5f57}.t-min{background:#febc2e}.t-max{background:#28c840}
.window:not(.focused) .tl{background:#c5c5c9}
body.dark .window:not(.focused) .tl{background:#5a5a60}
.tl::before{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:9.5px;font-weight:800;color:rgba(0,0,0,.55);opacity:0;line-height:1;
}
.t-close::before{content:'\00d7'}
.t-min::before{content:'\2212'}
.t-max::before{content:'+'}
.traffic:hover .tl::before{opacity:1}

/* Resize handles */
.rh{position:absolute;z-index:40}
.rh-n{top:-3px;left:10px;right:10px;height:7px;cursor:ns-resize}
.rh-s{bottom:-3px;left:10px;right:10px;height:7px;cursor:ns-resize}
.rh-e{right:-3px;top:10px;bottom:10px;width:7px;cursor:ew-resize}
.rh-w{left:-3px;top:10px;bottom:10px;width:7px;cursor:ew-resize}
.rh-ne{top:-3px;right:-3px;width:14px;height:14px;cursor:nesw-resize}
.rh-nw{top:-3px;left:-3px;width:14px;height:14px;cursor:nwse-resize}
.rh-se{bottom:-3px;right:-3px;width:14px;height:14px;cursor:nwse-resize}
.rh-sw{bottom:-3px;left:-3px;width:14px;height:14px;cursor:nesw-resize}

/* Toolbar widgets used in several titlebars */
.tb-btn{
  display:flex;align-items:center;justify-content:center;width:28px;height:24px;border-radius:6px;flex:none;
}
.tb-btn svg{width:16px;height:16px;fill:none;stroke:var(--text);stroke-width:2;stroke-linecap:round;stroke-linejoin:round;opacity:.75}
.tb-btn:hover{background:var(--hover)}
.tb-btn:disabled{opacity:.3;pointer-events:none}
.tb-btn.active{background:var(--accent-soft)}
.tb-btn.active svg{stroke:var(--accent);opacity:1}
.tb-title{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tb-spacer{flex:1}

/* ---------- Dock ---------- */
#dock-wrap{position:absolute;bottom:0;left:0;right:0;z-index:5000;display:flex;justify-content:center;padding:6px;pointer-events:none}
#dock{
  display:flex;align-items:flex-end;padding:5px 8px;border-radius:20px;pointer-events:auto;
  background:var(--dock-bg);
  backdrop-filter:blur(30px) saturate(1.8);-webkit-backdrop-filter:blur(30px) saturate(1.8);
  border:.5px solid var(--dock-border);
  box-shadow:0 12px 40px rgba(0,0,0,.35);
}
.dock-item{
  position:relative;padding:2px 5px 9px;flex:none;
  transform:translateY(calc((1 - var(--s,1)) * 17px)) scale(var(--s,1));
  transform-origin:50% 100%;
  /* widen the layout slot as the icon scales so neighbours spread apart (macOS-style) */
  margin:0 calc((var(--s,1) - 1) * 28px);
  transition:transform .1s ease-out,margin .1s ease-out;
}
.dock-icon{display:block;width:46px;height:46px}
.dock-icon svg{width:100%;height:100%;filter:drop-shadow(0 3px 5px rgba(0,0,0,.3))}
.dock-icon.bouncing{animation:dockBounce .55s ease 2}
@keyframes dockBounce{0%,100%{transform:translateY(0)}40%{transform:translateY(-30px)}}
.dock-item::after{
  content:'';position:absolute;left:50%;bottom:3px;width:4px;height:4px;margin-left:-2px;border-radius:50%;
  background:var(--text);opacity:0;transition:opacity .25s;
}
.dock-item.running::after{opacity:.55}
.dock-sep{width:1px;align-self:stretch;margin:6px 5px;background:var(--border)}
#dock.drop-target{outline:2px solid var(--accent);outline-offset:3px;background:var(--accent-soft)}
#dock-dyn{display:flex;align-items:flex-end}
#dock-dyn:not(:empty){border-right:1px solid var(--border);margin-right:4px;padding-right:4px}
#dock-label{
  position:fixed;z-index:9500;transform:translateX(-50%);padding:3px 11px;border-radius:7px;
  background:var(--menu-bg);border:.5px solid var(--border);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  font-size:12.5px;font-weight:500;pointer-events:none;display:none;white-space:nowrap;
  box-shadow:0 4px 14px rgba(0,0,0,.2);
}

/* ---------- Notifications ---------- */
#notifications{position:absolute;top:36px;right:12px;z-index:8000;display:flex;flex-direction:column;gap:9px;width:344px}
.notif{
  display:flex;align-items:center;gap:11px;padding:11px 13px;border-radius:14px;
  background:var(--notif-bg);
  backdrop-filter:blur(30px) saturate(1.6);-webkit-backdrop-filter:blur(30px) saturate(1.6);
  border:.5px solid var(--border);
  box-shadow:0 10px 34px rgba(0,0,0,.26);
  transform:translateX(120%);transition:transform .45s cubic-bezier(.2,.9,.3,1),opacity .3s;
  position:relative;
}
.notif.show{transform:translateX(0)}
.notif.hide{transform:translateX(120%);opacity:0}
.n-icon{width:34px;height:34px;flex:none}
.n-icon svg{width:100%;height:100%}
.n-text{flex:1;min-width:0}
.n-title{font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.n-body{font-size:12.5px;color:var(--text-sec);line-height:1.3}
.n-close{
  position:absolute;top:-6px;left:-6px;width:20px;height:20px;border-radius:50%;font-size:12px;line-height:1;
  background:var(--menu-bg);border:.5px solid var(--border);color:var(--text);display:none;
  align-items:center;justify-content:center;
}
.notif:hover .n-close{display:flex}

/* ---------- Finder ---------- */
.fd-side{
  flex:none;width:170px;padding:10px 8px;overflow-y:auto;
  background:var(--sidebar-bg);border-right:.5px solid var(--border);
}
.fd-side h4{font-size:11px;color:var(--text-sec);margin:2px 8px 5px;font-weight:600}
.fd-sitem{
  display:flex;align-items:center;gap:7px;padding:4px 9px;border-radius:6px;font-size:13px;cursor:default;
}
.fd-sitem svg{width:15px;height:15px;flex:none}
.fd-sitem:hover{background:var(--hover)}
.fd-sitem.active{background:var(--accent-soft)}
.fd-main{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--content-bg)}
.fd-scroll{flex:1;overflow:auto;padding:12px}
.fd-status{
  flex:none;height:24px;display:flex;align-items:center;justify-content:center;font-size:11.5px;
  color:var(--text-sec);border-top:.5px solid var(--border);background:var(--content-bg2);
}
/* icon view */
.fd-grid{display:flex;flex-wrap:wrap;align-content:flex-start;gap:4px}
.fitem{
  width:92px;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 4px;border-radius:8px;cursor:default;
}
.fitem-img{width:48px;height:48px;padding:2px;border-radius:8px}
.fitem-img svg{width:100%;height:100%}
.fitem-label{
  font-size:11.5px;text-align:center;line-height:1.25;border-radius:4px;padding:1px 5px;word-break:break-word;max-width:90px;
}
.fitem.selected .fitem-img{background:var(--hover)}
.fitem.selected .fitem-label{background:var(--accent);color:#fff}
.fitem-label input{
  width:84px;font-size:11.5px;text-align:center;border:1.5px solid var(--accent);border-radius:4px;outline:none;
  background:var(--content-bg);color:var(--text);
}
/* list view */
.fd-list{width:100%;border-collapse:collapse;font-size:12.5px}
.fd-list th{
  text-align:left;font-size:11.5px;color:var(--text-sec);font-weight:600;padding:2px 10px 7px;
  border-bottom:.5px solid var(--border);
}
.fd-list td{padding:3.5px 10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:260px}
.fd-list .frow{cursor:default}
.fd-list .frow:nth-child(even){background:var(--content-bg2)}
.fd-list .frow.selected{background:var(--accent)}
.fd-list .frow.selected td{color:#fff}
.fd-list .fname{display:flex;align-items:center;gap:7px}
.fd-list .fname svg{width:17px;height:17px;flex:none}
.fd-list .frow input{font-size:12.5px;border:1.5px solid var(--accent);border-radius:4px;outline:none;background:var(--content-bg);color:var(--text)}

/* ---------- Terminal ---------- */
.term{
  flex:1;background:rgba(16,16,21,.92);color:#e6e6e6;overflow-y:auto;outline:none;cursor:text;
  font-family:ui-monospace,"SF Mono",Menlo,Monaco,Consolas,monospace;font-size:12.5px;line-height:1.5;
  padding:8px 10px;user-select:text;-webkit-user-select:text;
}
.term .t-row{white-space:pre-wrap;word-break:break-all;min-height:1.2em}
.term .t-err{color:#ff7b72}
.term .t-dir{color:#79c0ff;font-weight:700}
.term .t-user{color:#7ee787;font-weight:700}
.term .t-path{color:#79c0ff;font-weight:700}
.t-line{display:flex;flex-wrap:wrap;align-items:baseline;white-space:pre-wrap;word-break:break-all}
.t-caret{
  display:inline-block;width:7.5px;height:15px;background:#bbb;vertical-align:text-bottom;
  animation:caretBlink 1.1s steps(1) infinite;
}
.term:not(.focus) .t-caret{animation:none;background:transparent;box-shadow:inset 0 0 0 1px #888}
@keyframes caretBlink{0%,55%{opacity:1}56%,100%{opacity:0}}

/* ---------- Browser ---------- */
.br-addr{
  flex:1;height:26px;min-width:60px;padding:0 12px;border-radius:8px;font-size:12.5px;text-align:center;
  border:.5px solid var(--border);background:var(--content-bg);color:var(--text);outline:none;
}
.br-addr:focus{box-shadow:0 0 0 3px var(--accent-soft);border-color:var(--accent);text-align:left}
.br-tabs{
  flex:none;display:flex;gap:5px;padding:5px 8px 0;background:var(--content-bg2);
  border-bottom:.5px solid var(--border);overflow-x:auto;
}
.br-tab{
  display:flex;align-items:center;gap:6px;min-width:110px;max-width:190px;padding:5px 9px;
  border-radius:8px 8px 0 0;font-size:12px;cursor:default;flex:1;
}
.br-tab span{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.br-tab.active{background:var(--content-bg);box-shadow:0 -2px 6px rgba(0,0,0,.05)}
.br-tab:not(.active):hover{background:var(--hover)}
.br-tab .x{width:16px;height:16px;border-radius:4px;font-size:12px;line-height:1;flex:none;display:flex;align-items:center;justify-content:center}
.br-tab .x:hover{background:var(--hover)}
.br-newtab{flex:none;width:26px;font-size:16px;color:var(--text-sec);border-radius:6px}
.br-newtab:hover{background:var(--hover)}
.br-page{flex:1;overflow-y:auto;background:var(--content-bg)}
.bp{padding:34px 40px;max-width:760px;margin:0 auto;font-size:14px;line-height:1.55;user-select:text;-webkit-user-select:text}
.bp h1{font-size:30px;font-weight:800;margin-bottom:6px}
.bp h2{font-size:19px;margin:22px 0 8px}
.bp p{color:var(--text-sec);margin:7px 0}
.bp a,[data-href]{color:var(--accent);cursor:pointer;text-decoration:none}
.bp [data-href]:hover{text-decoration:underline}
.bp .hero{
  padding:34px;border-radius:18px;color:#fff;margin-bottom:26px;
  background:linear-gradient(135deg,var(--accent),#7b4dff);
}
.bp .hero h1{color:#fff}
.bp .hero p{color:rgba(255,255,255,.8)}
.bsearch{
  width:100%;height:40px;padding:0 18px;border-radius:20px;font-size:14px;outline:none;
  border:.5px solid var(--border);background:var(--content-bg2);color:var(--text);
}
.bp .favs{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:12px;margin-top:18px}
.bp .fav{
  padding:16px 12px;border-radius:13px;background:var(--content-bg2);text-align:center;
  border:.5px solid var(--border);font-weight:600;font-size:13px;color:var(--text);
}
.bp .fav .fav-ico{font-size:24px;margin-bottom:7px}
.bp .fav:hover{background:var(--hover);text-decoration:none}
.bp .result{margin:18px 0}
.bp .result .r-url{font-size:12px;color:#3fa34d}
.bp .result .r-title{font-size:17px}
.bp .err-box{text-align:center;padding:70px 0;color:var(--text-sec)}
.bp .err-box .big{font-size:52px;margin-bottom:14px}

/* ---------- Music ---------- */
.mu{flex:1;display:flex;min-width:0;background:var(--content-bg)}
.mu-side{flex:none;width:215px;overflow-y:auto;background:var(--sidebar-bg);border-right:.5px solid var(--border);padding:10px 8px}
.mu-side h4{font-size:11px;color:var(--text-sec);margin:3px 9px 6px;font-weight:600}
.mu-trk{display:flex;align-items:center;gap:9px;padding:6px 9px;border-radius:7px;cursor:default}
.mu-trk:hover{background:var(--hover)}
.mu-trk.active{background:var(--accent-soft)}
.mu-trk .sw{width:30px;height:30px;border-radius:7px;flex:none;display:flex;align-items:center;justify-content:center}
.mu-trk .sw svg{width:15px;height:15px;fill:#fff}
.mu-trk .ti{min-width:0}
.mu-trk .ti b{display:block;font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mu-trk .ti i{display:block;font-style:normal;font-size:11px;color:var(--text-sec)}
.mu-main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:13px;padding:22px;min-width:0}
.mu-art{
  width:148px;height:148px;border-radius:22px;display:flex;align-items:center;justify-content:center;
  box-shadow:0 16px 36px rgba(0,0,0,.3);transition:background .5s;
}
.mu-art svg{width:64px;height:64px;fill:rgba(255,255,255,.92);filter:drop-shadow(0 2px 5px rgba(0,0,0,.25))}
.mu-art.spin{animation:artPulse 2.2s ease-in-out infinite}
@keyframes artPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.035)}}
.mu-title{font-size:16.5px;font-weight:800;text-align:center}
.mu-artist{font-size:13px;color:var(--text-sec);margin-top:-9px}
#mu-viz{width:260px;height:44px}
.mu-seek{display:flex;align-items:center;gap:9px;width:300px;font-size:11px;color:var(--text-sec)}
.mu-seek input{flex:1}
.mu-ctl{display:flex;align-items:center;gap:20px}
.mu-btn{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.mu-btn:hover{background:var(--hover)}
.mu-btn svg{width:20px;height:20px;fill:var(--text)}
.mu-btn.big{width:52px;height:52px;background:var(--accent)}
.mu-btn.big svg{fill:#fff;width:23px;height:23px}
.mu-vol{display:flex;align-items:center;gap:8px;width:200px}
.mu-vol svg{width:16px;height:16px;fill:var(--text-sec);flex:none}
.mu-vol input{flex:1}
input[type=range]{-webkit-appearance:none;appearance:none;height:4px;border-radius:2px;background:rgba(127,127,127,.35);outline:none}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;appearance:none;width:14px;height:14px;border-radius:50%;background:#fff;
  border:.5px solid rgba(0,0,0,.2);box-shadow:0 1px 4px rgba(0,0,0,.3);cursor:pointer;
}

/* ---------- Settings ---------- */
.st-side{flex:none;width:185px;overflow-y:auto;background:var(--sidebar-bg);border-right:.5px solid var(--border);padding:10px 8px}
.st-sitem{display:flex;align-items:center;gap:9px;padding:6px 9px;border-radius:7px;font-size:13px;cursor:default}
.st-sitem:hover{background:var(--hover)}
.st-sitem.active{background:var(--accent);color:#fff}
.st-ico{width:24px;height:24px;border-radius:6px;flex:none;display:flex;align-items:center;justify-content:center;color:#fff}
.st-ico svg{width:14px;height:14px;fill:#fff}
.st-main{flex:1;overflow-y:auto;padding:24px 28px;background:var(--content-bg)}
.st-main h2{font-size:21px;margin-bottom:18px}
.st-card{background:var(--content-bg2);border:.5px solid var(--border);border-radius:12px;padding:16px 18px;margin-bottom:16px}
.st-row{display:flex;align-items:center;justify-content:space-between;gap:14px}
.st-row + .st-row{margin-top:14px;padding-top:14px;border-top:.5px solid var(--border)}
.st-label b{display:block;font-size:13.5px}
.st-label span{font-size:12px;color:var(--text-sec)}
.theme-pick{display:flex;gap:14px}
.theme-card{border-radius:10px;padding:5px;border:2.5px solid transparent;text-align:center;font-size:12px}
.theme-card.sel{border-color:var(--accent)}
.theme-prev{width:104px;height:64px;border-radius:7px;position:relative;overflow:hidden;margin-bottom:5px;border:.5px solid var(--border)}
.theme-prev .tp-win{position:absolute;left:14px;top:16px;width:58px;height:38px;border-radius:5px}
.theme-prev.light{background:linear-gradient(135deg,#7cb8f0,#cfe3f7)}
.theme-prev.light .tp-win{background:rgba(255,255,255,.93)}
.theme-prev.dark{background:linear-gradient(135deg,#1c2740,#39314f)}
.theme-prev.dark .tp-win{background:rgba(44,44,52,.95)}
.accent-row{display:flex;gap:11px;flex-wrap:wrap}
.acc-dot{width:25px;height:25px;border-radius:50%;border:2.5px solid transparent;padding:0;box-shadow:inset 0 0 0 1.5px rgba(0,0,0,.12)}
.acc-dot.sel{border-color:var(--text)}
.wp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(118px,1fr));gap:13px}
.wp-card{border-radius:10px;padding:4px;border:2.5px solid transparent;text-align:center;font-size:11.5px}
.wp-card.sel{border-color:var(--accent)}
.wp-prev{height:70px;border-radius:7px;margin-bottom:4px;border:.5px solid var(--border)}
.switch{position:relative;width:42px;height:25px;flex:none}
.switch input{opacity:0;width:0;height:0}
.sw-slider{
  position:absolute;inset:0;border-radius:13px;background:rgba(127,127,127,.4);transition:background .25s;cursor:pointer;
}
.sw-slider::before{
  content:'';position:absolute;width:21px;height:21px;border-radius:50%;left:2px;top:2px;background:#fff;
  box-shadow:0 1px 4px rgba(0,0,0,.3);transition:transform .25s;
}
.switch input:checked + .sw-slider{background:var(--accent)}
.switch input:checked + .sw-slider::before{transform:translateX(17px)}
.st-btn{
  padding:5px 14px;border-radius:7px;font-size:12.5px;background:var(--accent);color:#fff;font-weight:600;
}
.st-btn:hover{filter:brightness(1.08)}

/* ---------- Web app windows (live site in an iframe) ---------- */
.webview-wrap{flex:1;display:flex;position:relative;background:#070912}
.webview{flex:1;border:none;width:100%;background:#070912}
.webview-loading{
  position:absolute;inset:0;display:flex;flex-direction:column;gap:14px;align-items:center;justify-content:center;
  color:#9aa3b8;font-size:13px;background:#070912;
}
.spinner{width:26px;height:26px;border-radius:50%;border:3px solid rgba(255,255,255,.15);border-top-color:#6ea8ff;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* while dragging/resizing windows, iframes must not swallow pointer events */
body.dragging iframe{pointer-events:none}

/* ---------- App Store ---------- */
.as-main{flex:1;overflow-y:auto;padding:22px 26px;background:var(--content-bg)}
.as-card{display:flex;align-items:center;gap:14px;padding:13px 15px;border:.5px solid var(--border);border-radius:14px;margin-bottom:11px;background:var(--content-bg2)}
.as-ico{width:52px;height:52px;flex:none}
.as-ico svg{width:100%;height:100%}
.as-info{flex:1;min-width:0}
.as-info b{display:block;font-size:14px}
.as-info i{display:block;font-style:normal;font-size:11px;color:var(--text-sec);margin:1px 0 3px}
.as-info p{font-size:12px;color:var(--text-sec);line-height:1.35}
.as-right{display:flex;flex-direction:column;align-items:center;gap:4px;flex:none}
.as-btn{
  min-width:72px;height:27px;border-radius:14px;background:var(--accent-soft);color:var(--accent);
  font-weight:800;font-size:12px;letter-spacing:.3px;display:flex;align-items:center;justify-content:center;
}
.as-btn:hover{background:var(--accent);color:#fff}
.as-btn:disabled{pointer-events:none}
.as-un{font-size:11px;color:var(--text-sec)}
.as-un:hover{text-decoration:underline;color:#ff453a}
.spinner-sm{width:14px;height:14px;border-width:2.5px;border-color:rgba(127,127,127,.3);border-top-color:var(--accent)}

/* ---------- TextEdit ---------- */
.textedit{
  flex:1;border:none;outline:none;resize:none;padding:16px 20px;font-size:13.5px;line-height:1.6;
  background:var(--content-bg);color:var(--text);user-select:text;-webkit-user-select:text;
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
}

/* ---------- About window ---------- */
.about{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;padding:22px;background:var(--content-bg)}
.about svg{width:54px;height:54px;fill:var(--text);margin-bottom:10px}
.about h2{font-size:23px;font-weight:800}
.about .ver{color:var(--text-sec);font-size:13px;margin-bottom:13px}
.about table{font-size:12.5px;border-spacing:14px 4px}
.about td:first-child{color:var(--text-sec);text-align:right}

/* ---------- Sleep / power overlays ---------- */
#sleep{position:fixed;inset:0;z-index:10000;background:#000;opacity:0;pointer-events:none;transition:opacity 1s ease}
#sleep.on{opacity:1;pointer-events:auto}
#power{position:fixed;inset:0;z-index:10500;background:#000;display:none;align-items:center;justify-content:center;flex-direction:column;gap:22px;color:#666}
#power.on{display:flex}
#power button{width:74px;height:74px;border-radius:50%;border:2.5px solid #555;color:#888;display:flex;align-items:center;justify-content:center;transition:all .3s}
#power button:hover{border-color:#fff;color:#fff;transform:scale(1.06)}
#power svg{width:32px;height:32px;fill:none;stroke:currentColor;stroke-width:2.5;stroke-linecap:round}
</style>

/* ============================================================
   3. SOUND EFFECTS (Web Audio)
   ============================================================ */
const AudioHub = {
  ctx: null,
  get(){
    if (!this.ctx){
      const AC = window.AudioContext || window.webkitAudioContext;
      this.ctx = new AC();
    }
    if (this.ctx.state === 'suspended') this.ctx.resume();
    return this.ctx;
  }
};
const Sfx = {
  tone(freq, dur, type = 'sine', vol = .05, delay = 0){
    if (!settings.sound || !userGestured) return;
    try {
      const c = AudioHub.get();
      const t = c.currentTime + delay;
      const o = c.createOscillator(), g = c.createGain();
      o.type = type; o.frequency.value = freq;
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(vol, t + .012);
      g.gain.exponentialRampToValueAtTime(.0001, t + dur);
      o.connect(g); g.connect(c.destination);
      o.start(t); o.stop(t + dur + .05);
    } catch(e){}
  },
  click(){ this.tone(950, .05, 'sine', .035); },
  open(){ this.tone(520, .12, 'sine', .05); this.tone(784, .15, 'sine', .04, .06); },
  close(){ this.tone(620, .1, 'sine', .05); this.tone(415, .13, 'sine', .04, .05); },
  minimize(){ this.tone(700, .1, 'sine', .04); this.tone(500, .14, 'sine', .035, .07); },
  notify(){ this.tone(880, .12, 'sine', .05); this.tone(1175, .22, 'sine', .045, .09); },
  trash(){ this.tone(190, .16, 'triangle', .07); },
  error(){ this.tone(220, .18, 'square', .035); },
};

/* ============================================================
   4. VIRTUAL FILE SYSTEM
   ============================================================ */
const FS = (() => {
  const root = { type:'dir', name:'', children:{} };
  const listeners = new Set();

  const emit = () => listeners.forEach(f => { try { f(); } catch(e){} });
  const onChange = f => { listeners.add(f); return () => listeners.delete(f); };

  function resolve(base, p){
    if (!p) return base;
    if (p === '~') p = HOME;
    else if (p.startsWith('~/')) p = HOME + p.slice(1);
    if (!p.startsWith('/')) p = (base === '/' ? '' : base) + '/' + p;
    const out = [];
    for (const part of p.split('/')){
      if (!part || part === '.') continue;
      if (part === '..') out.pop(); else out.push(part);
    }
    return '/' + out.join('/');
  }
  function get(path){
    if (path === '/' || path === '') return root;
    let n = root;
    for (const part of path.split('/').filter(Boolean)){
      if (!n || n.type !== 'dir') return null;
      n = n.children[part];
    }
    return n || null;
  }
  const parentPath = p => { const i = p.lastIndexOf('/'); return i <= 0 ? '/' : p.slice(0, i); };
  const baseName = p => p.split('/').filter(Boolean).pop() || '';

  function uniqueIn(dir, desired){
    if (!dir.children[desired]) return desired;
    const m = desired.match(/^(.*?)(\.[^.]+)?$/);
    const stem = m[1], ext = m[2] || '';
    let i = 2;
    while (dir.children[`${stem} ${i}${ext}`]) i++;
    return `${stem} ${i}${ext}`;
  }
  function mk(path, type, content = ''){
    const pp = parentPath(path), name = baseName(path);
    if (!name) return 'invalid name';
    const p = get(pp);
    if (!p || p.type !== 'dir') return `no such directory: ${pp}`;
    if (p.children[name]) return `"${name}" already exists`;
    p.children[name] = type === 'dir'
      ? { type:'dir', name, children:{} }
      : { type:'file', name, content };
    emit();
    return null;
  }
  function write(path, content){
    const n = get(path);
    if (n){ if (n.type !== 'file') return 'is a directory'; n.content = content; emit(); return null; }
    return mk(path, 'file', content);
  }
  function remove(path){
    const p = get(parentPath(path)), name = baseName(path);
    if (!p || !p.children || !p.children[name]) return `no such file or directory: ${name}`;
    delete p.children[name];
    emit();
    return null;
  }
  function rename(path, newName){
    newName = (newName || '').trim();
    if (!newName) return 'name cannot be empty';
    if (/[/]/.test(newName)) return 'name cannot contain "/"';
    const p = get(parentPath(path)), old = baseName(path);
    if (!p || !p.children[old]) return 'item not found';
    if (newName === old) return null;
    if (p.children[newName]) return `"${newName}" already exists`;
    const node = p.children[old];
    delete p.children[old];
    node.name = newName;
    p.children[newName] = node;
    emit();
    return null;
  }
  function move(path, destDir){
    const node = get(path), dest = get(destDir);
    if (!node || !dest || dest.type !== 'dir') return 'move failed';
    if (path === destDir || destDir.startsWith(path + '/')) return 'cannot move a folder into itself';
    const p = get(parentPath(path));
    delete p.children[node.name];
    const name = uniqueIn(dest, node.name);
    node.name = name;
    dest.children[name] = node;
    emit();
    return null;
  }

  /* ----- Seed content ----- */
  function seedDir(path){ const err = mk(path, 'dir'); return err; }
  ['/Applications','/System','/Trash','/Users','/Users/guest',
   HOME+'/Desktop', HOME+'/Documents', HOME+'/Downloads', HOME+'/Desktop/Projects',
   HOME+'/Documents/Work'].forEach(seedDir);
  write(HOME+'/Desktop/Welcome.txt',
`Welcome to macOS Web!

This entire desktop is one self-contained HTML file.

Things to try:
  • Open Terminal from the Dock and type "help"
  • Create folders here, then find them in Finder & Terminal
  • Play a synthesized song in Music
  • Switch to Dark Mode in System Settings
  • Drag, resize, minimize and zoom windows

Have fun!`);
  write(HOME+'/Desktop/Notes.md', `# Notes\n\n- Everything here is a virtual file system\n- Files you edit in TextEdit are saved in memory\n- The Terminal sees the same files as Finder`);
  write(HOME+'/Desktop/Projects/ideas.txt', 'Project ideas:\n1. A weather widget\n2. A pixel-art editor\n3. Snake in the Terminal');
  write(HOME+'/Documents/resume.txt', 'Guest User\nDesktop Explorer\n\nExperience:\n- Clicking things (10+ years)\n- Dragging windows (expert)');
  write(HOME+'/Documents/recipe.md', '# Pancakes\n\n1. Mix flour, milk, eggs\n2. Fry until golden\n3. Add maple syrup');
  write(HOME+'/Documents/Work/report.txt', 'Q2 Report\n\nEverything is up and to the right.');
  write(HOME+'/Downloads/wallpapers.zip', '[binary-ish data… just kidding, it is text]');
  write(HOME+'/Downloads/installer.dmg', 'This is definitely a disk image. Trust me.');

  return { get, resolve, mk, write, remove, rename, move, onChange, uniqueIn, parentPath, baseName };
})();

/* ============================================================
   5. NOTIFICATIONS
   ============================================================ */
function notify(title, body, icon){
  const wrap = $('#notifications');
  while (wrap.children.length >= 4) wrap.firstChild.remove();
  const card = el('div', 'notif',
    `<div class="n-icon">${icon || ICONS.finder}</div>
     <div class="n-text"><div class="n-title"></div><div class="n-body"></div></div>
     <button class="n-close">×</button>`);
  card.querySelector('.n-title').textContent = title;
  card.querySelector('.n-body').textContent = body;
  wrap.append(card);
  requestAnimationFrame(() => requestAnimationFrame(() => card.classList.add('show')));
  const dismiss = () => {
    card.classList.add('hide');
    setTimeout(() => card.remove(), 400);
  };
  let timer = setTimeout(dismiss, 5000);
  card.addEventListener('mouseenter', () => clearTimeout(timer));
  card.addEventListener('mouseleave', () => { timer = setTimeout(dismiss, 2500); });
  card.querySelector('.n-close').addEventListener('click', dismiss);
  Sfx.notify();
}
