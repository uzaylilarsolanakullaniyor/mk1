const CtxMenu = {
  elm: null,
  show(x, y, items){
    this.hide();
    const m = el('div', 'ctxmenu');
    items.forEach(it => {
      if (it === '-'){ m.append(el('div', 'ctx-sep')); return; }
      const b = el('div', 'ctx-item' + (it.danger ? ' danger' : '') + (it.disabled ? ' disabled' : ''));
      b.append(document.createTextNode(it.label));
      if (it.kbd) b.append(el('span', 'kbd', escHtml(it.kbd)));
      if (!it.disabled) b.addEventListener('click', () => { this.hide(); Sfx.click(); it.action && it.action(); });
      m.append(b);
    });
    document.body.append(m);
    const r = m.getBoundingClientRect();
    m.style.left = clamp(x, 4, innerWidth - r.width - 6) + 'px';
    m.style.top = clamp(y, 30, innerHeight - r.height - 6) + 'px';
    this.elm = m;
  },
  hide(){ if (this.elm){ this.elm.remove(); this.elm = null; } }
};
document.addEventListener('pointerdown', e => {
  if (CtxMenu.elm && !CtxMenu.elm.contains(e.target)) CtxMenu.hide();
}, true);
document.addEventListener('keydown', e => { if (e.key === 'Escape'){ CtxMenu.hide(); MenuBar.closeMenus(); } });

/* ============================================================
   7. WINDOW MANAGER
   ============================================================ */
const WM = (() => {
  let zTop = 100;
  const wins = new Set();
  let focused = null;
  const layer = $('#windows');

  function create(o){
    const w = {
      id: 'w' + (++uid), app: o.app, minimized: false, maximized: false, prevRect: null,
      el: null, contentEl: null, onCloseCb: o.onClose || null,
    };
    const e = el('div', 'window opening');
    const n = wins.size;
    e.style.width  = (o.width  || 640) + 'px';
    e.style.height = (o.height || 420) + 'px';
    e.style.left = (o.x != null ? o.x : clamp(110 + (n % 7) * 36, 0, Math.max(10, innerWidth - (o.width || 640) - 40))) + 'px';
    e.style.top  = (o.y != null ? o.y : 64 + (n % 7) * 30) + 'px';
    e.style.zIndex = ++zTop;

    const tb = el('div', 'titlebar');
    const traffic = el('div', 'traffic',
      `<button class="tl t-close" title="Close"></button>
       <button class="tl t-min" title="Minimize"></button>
       <button class="tl t-max" title="Zoom"></button>`);
    tb.append(traffic);
    let titleEl = null;
    if (o.toolbar){ tb.append(o.toolbar); }
    else { titleEl = el('div', 'win-title'); titleEl.textContent = o.title || ''; tb.append(titleEl); }

    const body = el('div', 'win-body');
    if (o.content) body.append(o.content);

    e.append(tb, body);
    w.el = e; w.contentEl = body; w.titleEl = titleEl;

    /* --- traffic light actions --- */
    traffic.querySelectorAll('.tl').forEach(b => b.addEventListener('pointerdown', ev => ev.stopPropagation()));
    traffic.querySelector('.t-close').addEventListener('click', () => close(w));
    traffic.querySelector('.t-min').addEventListener('click', () => minimize(w));
    traffic.querySelector('.t-max').addEventListener('click', () => toggleMax(w));

    /* --- dragging --- */
    tb.addEventListener('pointerdown', ev => {
      if (ev.button !== 0) return;
      if (ev.target.closest('button,input,select,.no-drag')) return;
      focus(w);
      document.body.classList.add('dragging');
      const sx = ev.clientX, sy = ev.clientY, ol = e.offsetLeft, ot = e.offsetTop;
      const mv = m => {
        w.maximized = false;
        e.style.left = clamp(ol + m.clientX - sx, -e.offsetWidth + 90, innerWidth - 90) + 'px';
        e.style.top  = clamp(ot + m.clientY - sy, 28, innerHeight - 50) + 'px';
      };
      const up = () => { document.body.classList.remove('dragging'); removeEventListener('pointermove', mv); removeEventListener('pointerup', up); };
      addEventListener('pointermove', mv);
      addEventListener('pointerup', up);
    });
    tb.addEventListener('dblclick', ev => {
      if (ev.target.closest('button,input,select,.no-drag')) return;
      toggleMax(w);
    });

    /* --- resizing --- */
    if (!o.fixed){
      const minW = o.minW || 360, minH = o.minH || 220;
      ['n','s','e','w','ne','nw','se','sw'].forEach(dir => {
        const h = el('div', 'rh rh-' + dir);
        h.addEventListener('pointerdown', ev => {
          if (ev.button !== 0) return;
          ev.preventDefault(); ev.stopPropagation();
          focus(w);
          document.body.classList.add('dragging');
          const sx = ev.clientX, sy = ev.clientY;
          const r = { l: e.offsetLeft, t: e.offsetTop, w: e.offsetWidth, h: e.offsetHeight };
          const mv = m => {
            const dx = m.clientX - sx, dy = m.clientY - sy;
            let L = r.l, T = r.t, W = r.w, H = r.h;
            if (dir.includes('e')) W = Math.max(minW, r.w + dx);
            if (dir.includes('s')) H = Math.max(minH, r.h + dy);
            if (dir.includes('w')){ W = Math.max(minW, r.w - dx); L = r.l + (r.w - W); }
            if (dir.includes('n')){ H = Math.max(minH, r.h - dy); T = r.t + (r.h - H); if (T < 28){ H -= 28 - T; T = 28; } }
            e.style.left = L + 'px'; e.style.top = T + 'px';
            e.style.width = W + 'px'; e.style.height = H + 'px';
            w.maximized = false;
          };
          const up = () => { document.body.classList.remove('dragging'); removeEventListener('pointermove', mv); removeEventListener('pointerup', up); };
          addEventListener('pointermove', mv);
          addEventListener('pointerup', up);
        });
        e.append(h);
      });
    }

    e.addEventListener('pointerdown', () => focus(w));

    layer.append(e);
    wins.add(w);
    focus(w);
    setTimeout(() => e.classList.remove('opening'), 360);
    Sfx.open();
    Dock.update();

    w.close = () => close(w);
    w.setTitle = t => { if (w.titleEl) w.titleEl.textContent = t; };
    w.focus = () => focus(w);
    return w;
  }

  function close(w){
    if (!wins.has(w)) return;
    wins.delete(w);
    try { w.onCloseCb && w.onCloseCb(); } catch(e){}
    Sfx.close();
    if (w.minimized){ w.el.remove(); }
    else { w.el.classList.add('closing'); setTimeout(() => w.el.remove(), 200); }
    if (focused === w){ focused = null; focusTop(); }
    Dock.update();
  }

  function focus(w){
    if (w.minimized) return restore(w);
    if (focused !== w){
      focused = w;
      w.el.style.zIndex = ++zTop;
      wins.forEach(x => x.el.classList.toggle('focused', x === w));
      MenuBar.setAppName((APPS[w.app] && APPS[w.app].name) || 'Finder');
    }
  }

  function focusTop(){
    let best = null;
    wins.forEach(x => { if (!x.minimized && (!best || +x.el.style.zIndex > +best.el.style.zIndex)) best = x; });
    if (best) focus(best);
    else MenuBar.setAppName('Finder');
  }

  function minimize(w){
    if (w.minimized) return;
    w.minimized = true;
    Sfx.minimize();
    const t = Dock.iconRectFor(w.app);
    const r = w.el.getBoundingClientRect();
    const dx = (t.left + t.width / 2) - (r.left + r.width / 2);
    const dy = (t.top + t.height / 2) - (r.top + r.height / 2);
    w.el.classList.add('minimizing');
    requestAnimationFrame(() => {
      w.el.style.transform = `translate(${dx}px,${dy}px) scale(0.04)`;
      w.el.style.opacity = '0';
    });
    setTimeout(() => { if (w.minimized) w.el.classList.add('minimized'); }, 440);
    if (focused === w){ focused = null; focusTop(); }
    Dock.update();
  }

  function restore(w){
    if (!w.minimized) return;
    w.minimized = false;
    w.el.classList.remove('minimized');
    requestAnimationFrame(() => requestAnimationFrame(() => {
      w.el.style.transform = '';
      w.el.style.opacity = '';
      setTimeout(() => w.el.classList.remove('minimizing'), 440);
    }));
    focus(w);
    Dock.update();
  }

  function toggleMax(w){
    const M = 8;
    w.el.classList.add('animating');
    setTimeout(() => w.el.classList.remove('animating'), 340);
    if (!w.maximized){
      w.prevRect = { l: w.el.offsetLeft, t: w.el.offsetTop, w: w.el.offsetWidth, h: w.el.offsetHeight };
      w.el.style.left = M + 'px';
      w.el.style.top = (28 + M) + 'px';
      w.el.style.width = (innerWidth - 2 * M) + 'px';
      w.el.style.height = (innerHeight - 28 - Dock.height() - 2 * M) + 'px';
      w.maximized = true;
    } else {
      const p = w.prevRect || { l: 120, t: 80, w: 640, h: 420 };
      w.el.style.left = p.l + 'px'; w.el.style.top = p.t + 'px';
      w.el.style.width = p.w + 'px'; w.el.style.height = p.h + 'px';
      w.maximized = false;
    }
  }

  const winsOf = app => [...wins].filter(w => w.app === app);

  return {
    create, minimize, restore, toggleMax, focus, winsOf,
    get focused(){ return focused; },
    closeFocused(){ if (focused) close(focused); },
    minimizeFocused(){ if (focused) minimize(focused); },
    zoomFocused(){ if (focused) toggleMax(focused); },
    closeAllOf(app){ winsOf(app).forEach(w => close(w)); },
    allApps(){ const s = new Set(); wins.forEach(w => s.add(w.app)); return s; },
  };
})();

/* ============================================================
   8. DOCK
   ============================================================ */
const Dock = (() => {
  const SYSTEM = ['finder','terminal','safari','appstore','music','settings'];
  let PINNED = SYSTEM.slice();
  let userPins = []; // user-pinned apps (drag a desktop icon onto the Dock), persisted
  const dock = $('#dock');
  const label = $('#dock-label');
  let dyn = null, trashItem = null, sepEl = null;
  const items = new Map(); // appId -> element

  function makeItem(id, name, icon, onClick){
    const it = el('button', 'dock-item');
    it.dataset.app = id;
    it.innerHTML = `<span class="dock-icon">${icon}</span>`;
    /* pointerup instead of click: while icons magnify they also shift sideways, so
       mousedown/mouseup can land on different elements and "click" never fires */
    it.addEventListener('pointerup', e => { if (e.button !== 0) return; Sfx.click(); onClick(); });
    it.addEventListener('contextmenu', e => {
      e.preventDefault(); e.stopPropagation();
      const menu = [{ label:'Open', action:onClick }];
      if (userPins.includes(id))
        menu.push('-', { label:'Remove from Dock', danger:true, action:() => unpin(id) });
      CtxMenu.show(e.clientX, e.clientY, menu);
    });
    it.addEventListener('mouseenter', () => {
      const r = it.getBoundingClientRect();
      label.textContent = name;
      label.style.left = (r.left + r.width / 2) + 'px';
      label.style.top = (r.top - 34) + 'px';
      label.style.display = 'block';
    });
    it.addEventListener('mouseleave', () => { label.style.display = 'none'; });
    return it;
  }

  function build(){
    /* restore the user's own Dock pins (APPS is defined by init time) */
    userPins = loadLS('mkos.dockpins', []).filter(id => APPS[id] && !SYSTEM.includes(id));
    PINNED = SYSTEM.concat(userPins);
    PINNED.forEach(id => {
      const it = makeItem(id, APPS[id].name, APPS[id].icon, () => handleClick(id));
      items.set(id, it);
      dock.append(it);
    });
    sepEl = el('div', 'dock-sep');
    dock.append(sepEl);
    dyn = el('div', '');
    dyn.id = 'dock-dyn';
    dock.append(dyn);
    trashItem = makeItem('trash', 'Trash', ICONS.trash, () => FinderApp.openAt('/Trash'));
    dock.append(trashItem);

    /* magnification — scale icons by cursor proximity (gaussian falloff) */
    const wrap = $('#dock-wrap');
    wrap.addEventListener('mousemove', e => {
      dock.querySelectorAll('.dock-item').forEach(it => {
        const r = it.getBoundingClientRect();
        const d = Math.abs(e.clientX - (r.left + r.width / 2));
        const s = 1 + 0.55 * Math.exp(-(d * d) / (2 * 62 * 62));
        it.style.setProperty('--s', s.toFixed(3));
      });
    });
    wrap.addEventListener('mouseleave', () => {
      dock.querySelectorAll('.dock-item').forEach(it => it.style.setProperty('--s', 1));
    });
  }

  function handleClick(id){
    const ws = WM.winsOf(id);
    if (!ws.length){ launchApp(id); return; }
    const mins = ws.filter(w => w.minimized);
    if (mins.length){ mins.forEach(w => WM.restore(w)); }
    else {
      ws.sort((a, b) => +b.el.style.zIndex - +a.el.style.zIndex);
      WM.focus(ws[0]);
    }
  }

  /* Refresh running indicators + dynamic icons for non-pinned running apps */
  function update(){
    PINNED.forEach(id => items.get(id).classList.toggle('running', WM.winsOf(id).length > 0));
    if (!dyn) return;
    const wanted = [...WM.allApps()].filter(a => !PINNED.includes(a) && APPS[a]);
    [...dyn.children].forEach(c => { if (!wanted.includes(c.dataset.app)) c.remove(); });
    wanted.forEach(id => {
      if (![...dyn.children].some(c => c.dataset.app === id)){
        const it = makeItem(id, APPS[id].name, APPS[id].icon, () => handleClick(id));
        it.classList.add('running');
        dyn.append(it);
      }
    });
  }

  function iconRectFor(app){
    const it = items.get(app) || (dyn && [...dyn.children].find(c => c.dataset.app === app)) || trashItem;
    return it.getBoundingClientRect();
  }
  function bounce(app){
    const it = items.get(app) || (dyn && [...dyn.children].find(c => c.dataset.app === app));
    if (!it) return;
    const ic = it.querySelector('.dock-icon');
    ic.classList.add('bouncing');
    setTimeout(() => ic.classList.remove('bouncing'), 1150);
  }
  function height(){ return $('#dock-wrap').getBoundingClientRect().height; }

  /* ---- user pinning (drag a desktop app icon onto the Dock) ---- */
  function pin(id){
    if (!APPS[id] || PINNED.includes(id)) return;
    const it = makeItem(id, APPS[id].name, APPS[id].icon, () => handleClick(id));
    items.set(id, it);
    dock.insertBefore(it, sepEl);
    PINNED.push(id);
    userPins.push(id);
    store('mkos.dockpins', userPins);
    update();
    bounce(id);
    notify(APPS[id].name, 'Added to the Dock.', APPS[id].icon);
  }
  function unpin(id){
    if (!userPins.includes(id)) return;
    userPins = userPins.filter(x => x !== id);
    PINNED = PINNED.filter(x => x !== id);
    store('mkos.dockpins', userPins);
    const it = items.get(id);
    if (it){ it.remove(); items.delete(id); }
    update(); // if the app is still running it reappears in the dynamic section
    notify(APPS[id].name, 'Removed from the Dock.', APPS[id].icon);
  }
  /* is (x,y) over the Dock? — used as the drop target test for desktop icons */
  function hitTest(x, y){
    const r = dock.getBoundingClientRect();
    return x >= r.left - 10 && x <= r.right + 10 && y >= r.top - 12;
  }

  return { build, update, iconRectFor, bounce, height, pin, unpin, hitTest,
           isPinned: id => PINNED.includes(id),
           isUserPin: id => userPins.includes(id) };
})();

/* ============================================================
   9. MENU BAR
   ============================================================ */
const MenuBar = (() => {
  const left = $('#mb-left'), right = $('#mb-right');
  let appNameEl = null, clockEl = null, volEl = null;
  let openMenu = null; // {item, pop}

  function menuDefs(){
    return [
      { id:'apple', label:null, icon:GLYPH.apple, items:[
        { label:'About This Mac', action:() => launchApp('about') },
        '-',
        { label:'System Settings…', action:() => launchApp('settings') },
        { label:'App Store…', action:() => launchApp('appstore') },
        '-',
        { label:'Sleep', action:sleep },
        { label:'Restart…', action:() => location.reload() },
        { label:'Shut Down…', action:shutDown },
        '-',
        { label:'Lock Screen', kbd:'⌃⌘Q', action:sleep },
      ]},
      { id:'app', label:'Finder', bold:true, items:[
        { label:'About', action:() => launchApp('about') },
        '-',
        { label:'Quit', kbd:'⌘Q', action:() => { const f = WM.focused; if (f) WM.closeAllOf(f.app); } },
      ]},
      { id:'file', label:'File', items:[
        { label:'New Finder Window', kbd:'⌘N', action:() => FinderApp.open() },
        { label:'New Folder on Desktop', kbd:'⇧⌘N', action:() => Desktop.newFolder() },
        '-',
        { label:'Close Window', kbd:'⌘W', action:() => WM.closeFocused() },
      ]},
      { id:'edit', label:'Edit', items:[
        { label:'Undo', kbd:'⌘Z', disabled:true },
        { label:'Redo', kbd:'⇧⌘Z', disabled:true },
        '-',
        { label:'Cut', kbd:'⌘X', disabled:true },
        { label:'Copy', kbd:'⌘C', disabled:true },
        { label:'Paste', kbd:'⌘V', disabled:true },
      ]},
      { id:'view', label:'View', items:[
        { label:'Toggle Dark Mode', action:() => SettingsApp.setTheme(settings.theme === 'dark' ? 'light' : 'dark') },
        { label:'Next Wallpaper', action:() => SettingsApp.setWallpaper((settings.wallpaper + 1) % WALLPAPERS.length) },
      ]},
      { id:'go', label:'Go', items:[
        { label:'Desktop', action:() => FinderApp.openAt(HOME + '/Desktop') },
        { label:'Documents', kbd:'⇧⌘O', action:() => FinderApp.openAt(HOME + '/Documents') },
        { label:'Downloads', kbd:'⌥⌘L', action:() => FinderApp.openAt(HOME + '/Downloads') },
        { label:'Home', kbd:'⇧⌘H', action:() => FinderApp.openAt(HOME) },
        '-',
        { label:'Trash', action:() => FinderApp.openAt('/Trash') },
      ]},
      { id:'window', label:'Window', items:[
        { label:'Minimize', kbd:'⌘M', action:() => WM.minimizeFocused() },
        { label:'Zoom', action:() => WM.zoomFocused() },
      ]},
      { id:'help', label:'Help', items:[
        { label:'macOS Web Help', action:() => BrowserApp.open('https://about.web/') },
        { label:'About This Simulation', action:() => launchApp('about') },
      ]},
    ];
  }

  function closeMenus(){
    if (openMenu){ openMenu.pop.remove(); openMenu.item.classList.remove('open'); openMenu = null; }
  }
  function showMenu(item, def){
    closeMenus();
    const pop = el('div', 'menu-pop');
    def.items.forEach(it => {
      if (it === '-'){ pop.append(el('div', 'ctx-sep')); return; }
      const b = el('div', 'ctx-item' + (it.disabled ? ' disabled' : ''));
      b.append(document.createTextNode(it.label));
      if (it.kbd) b.append(el('span', 'kbd', escHtml(it.kbd)));
      if (!it.disabled) b.addEventListener('click', () => { closeMenus(); Sfx.click(); it.action && it.action(); });
      pop.append(b);
    });
    document.body.append(pop);
    const r = item.getBoundingClientRect();
    pop.style.left = clamp(r.left, 4, innerWidth - pop.offsetWidth - 6) + 'px';
    pop.style.top = (r.bottom + 4) + 'px';
    item.classList.add('open');
    openMenu = { item, pop };
  }

  function build(){
    menuDefs().forEach(def => {
      const item = el('div', 'mb-item');
      if (def.icon) item.innerHTML = def.icon;
      else item.textContent = def.label;
      if (def.bold) item.id = 'mb-app';
      if (def.id === 'app') appNameEl = item;
      item.addEventListener('pointerdown', e => e.stopPropagation());
      item.addEventListener('click', () => {
        if (openMenu && openMenu.item === item) closeMenus();
        else showMenu(item, def);
      });
      item.addEventListener('mouseenter', () => { if (openMenu && openMenu.item !== item) showMenu(item, def); });
      left.append(item);
    });

    /* right side status items */
    volEl = el('div', 'mb-item mb-status', GLYPH.volOn);
    volEl.title = 'Toggle interface sounds';
    volEl.addEventListener('click', () => {
      SettingsApp.setSound(!settings.sound);
    });
    const wifi = el('div', 'mb-item mb-status', GLYPH.wifi);
    wifi.title = 'Wi-Fi: WebKit-5G';
    const batt = el('div', 'mb-item mb-status', GLYPH.battery);
    batt.title = 'Battery: 100 % (this Mac runs on imagination)';
    clockEl = el('div', 'mb-item');
    clockEl.id = 'mb-clock';
    right.append(volEl, wifi, batt, clockEl);

    tickClock();
    setInterval(tickClock, 1000);
    updateVolIcon();

    /* clicking anywhere else closes the menus */
    document.addEventListener('pointerdown', e => {
      if (openMenu && !openMenu.pop.contains(e.target)) closeMenus();
    });
  }

  function tickClock(){
    const d = new Date();
    const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const mon = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    let h = d.getHours();
    const am = h < 12 ? 'AM' : 'PM';
    h = h % 12 || 12;
    clockEl.textContent = `${days[d.getDay()]} ${mon[d.getMonth()]} ${d.getDate()}  ${h}:${String(d.getMinutes()).padStart(2,'0')} ${am}`;
  }
  function setAppName(n){ if (appNameEl) appNameEl.textContent = n; }
  function updateVolIcon(){
    volEl.innerHTML = settings.sound ? GLYPH.volOn : GLYPH.volOff;
    volEl.classList.toggle('muted', !settings.sound);
  }

  function sleep(){
    closeMenus();
    const s = $('#sleep');
    s.classList.add('on');
    const wake = () => { s.classList.remove('on'); s.removeEventListener('pointerdown', wake); };
    setTimeout(() => s.addEventListener('pointerdown', wake), 1100);
  }
  function shutDown(){
    closeMenus();
    const p = $('#power');
    p.innerHTML = '';
    const btn = el('button', '', GLYPH.power);
    const hint = el('div', '', 'Click to start up');
    btn.addEventListener('click', () => location.reload());
    p.append(btn, hint);
    p.classList.add('on');
  }

  return { build, setAppName, closeMenus, updateVolIcon };
})();

/* ============================================================
   10. INLINE RENAME helper (Finder + Desktop)
   ============================================================ */
function startRename(labelEl, oldName, onCommit){
  const input = el('input');
  input.value = oldName;
  labelEl.textContent = '';
  labelEl.append(input);
  input.focus();
  const dot = oldName.lastIndexOf('.');
  input.setSelectionRange(0, dot > 0 ? dot : oldName.length);
  let done = false;
  const commit = ok => {
    if (done) return;
    done = true;
    onCommit(ok ? input.value : null);
  };
  input.addEventListener('keydown', e => {
    e.stopPropagation();
    if (e.key === 'Enter') commit(true);
    if (e.key === 'Escape') commit(false);
  });
  input.addEventListener('blur', () => commit(true));
  input.addEventListener('pointerdown', e => e.stopPropagation());
  input.addEventListener('dblclick', e => e.stopPropagation());
}

/* ============================================================
   11. DESKTOP ICONS
   ============================================================ */
const Desktop = (() => {
  const root = $('#desktop');
  const SHORTCUTS = [
    { id:'app:terminal', app:'terminal' },
    { id:'app:safari',   app:'safari' },
    { id:'app:music',    app:'music' },
    { id:'app:appstore', app:'appstore' },
  ];
  let positions = loadLS('mkos.iconpos', {});
  let selected = null;
  let renameTarget = null;

  const dtPath = HOME + '/Desktop';

  function items(){
    /* app shortcuts + installed web apps (resolved lazily — WEB_APPS is defined below) */
    const shortcuts = SHORTCUTS.concat(WEB_APPS.filter(d => isInstalled(d.id)).map(d => ({ id:'app:' + d.id, app:d.id })));
    const out = shortcuts.map(s => ({ id:s.id, name:APPS[s.app].name, icon:APPS[s.app].icon, kind:'app', app:s.app }));
    const node = FS.get(dtPath);
    if (node){
      Object.values(node.children)
        .sort((a, b) => (a.type === b.type ? a.name.localeCompare(b.name) : a.type === 'dir' ? -1 : 1))
        .forEach(n => out.push({
          id:'fs:' + n.name, name:n.name, kind:n.type,
          icon:n.type === 'dir' ? ICONS.folder : ICONS.file,
          path:dtPath + '/' + n.name,
        }));
    }
    return out;
  }

  function defaultPos(i){
    const H = root.clientHeight - 110, perCol = Math.max(1, Math.floor(H / 100));
    const col = Math.floor(i / perCol), row = i % perCol;
    return { x: root.clientWidth - 104 - col * 94, y: 14 + row * 100 };
  }

  function render(){
    root.innerHTML = '';
    items().forEach((it, i) => {
      const p = positions[it.id] || defaultPos(i);
      const d = el('div', 'dicon');
      d.style.left = clamp(p.x, 0, root.clientWidth - 88) + 'px';
      d.style.top = clamp(p.y, 0, root.clientHeight - 100) + 'px';
      d.innerHTML = `<span class="dicon-img">${it.icon}</span><span class="dicon-label"></span>`;
      const lab = d.querySelector('.dicon-label');
      lab.textContent = it.name;
      if (it.id === selected) d.classList.add('selected');

      /* select + drag */
      d.addEventListener('pointerdown', e => {
        if (e.button !== 0) return;
        e.stopPropagation();
        select(it.id, d);
        const sx = e.clientX, sy = e.clientY, ol = d.offsetLeft, ot = d.offsetTop;
        let moved = false;
        const mv = m => {
          if (!moved && Math.hypot(m.clientX - sx, m.clientY - sy) < 5) return;
          moved = true;
          d.style.left = clamp(ol + m.clientX - sx, 0, root.clientWidth - 88) + 'px';
          d.style.top = clamp(ot + m.clientY - sy, 0, root.clientHeight - 100) + 'px';
          /* highlight the Dock while an app icon hovers over it */
          if (it.kind === 'app')
            $('#dock').classList.toggle('drop-target', Dock.hitTest(m.clientX, m.clientY) && !Dock.isPinned(it.app));
        };
        const up = m => {
          removeEventListener('pointermove', mv); removeEventListener('pointerup', up);
          $('#dock').classList.remove('drop-target');
          if (!moved) return;
          /* dropping an app shortcut on the Dock pins it; the shortcut snaps back to its place */
          if (it.kind === 'app' && Dock.hitTest(m.clientX, m.clientY)){
            d.style.left = ol + 'px';
            d.style.top = ot + 'px';
            Dock.pin(it.app);
            return;
          }
          positions[it.id] = { x: d.offsetLeft, y: d.offsetTop };
          store('mkos.iconpos', positions);
        };
        addEventListener('pointermove', mv);
        addEventListener('pointerup', up);
      });
      d.addEventListener('dblclick', () => openItem(it));
      d.addEventListener('contextmenu', e => {
        e.preventDefault(); e.stopPropagation();
        select(it.id, d);
        const menu = [{ label:'Open', action:() => openItem(it) }];
        if (it.kind === 'app'){
          if (Dock.isUserPin(it.app))
            menu.push('-', { label:'Remove from Dock', action:() => Dock.unpin(it.app) });
          else if (!Dock.isPinned(it.app))
            menu.push('-', { label:'Add to Dock', action:() => Dock.pin(it.app) });
          if (WEB_APPS.some(d => d.id === it.app))
            menu.push({ label:'Uninstall…', danger:true, action:() => uninstallApp(it.app) });
        }
        if (it.kind !== 'app'){
          menu.push('-',
            { label:'Rename', action:() => beginRename(d, it) },
            { label:'Move to Trash', danger:true, action:() => {
              FS.move(it.path, '/Trash'); Sfx.trash();
              notify('Finder', `Moved “${it.name}” to Trash.`, ICONS.trash);
            }});
        }
        CtxMenu.show(e.clientX, e.clientY, menu);
      });
      root.append(d);

      if (renameTarget && it.id === 'fs:' + renameTarget){
        renameTarget = null;
        beginRename(d, it);
      }
    });
  }

  function beginRename(d, it){
    const lab = d.querySelector('.dicon-label');
    startRename(lab, it.name, nv => {
      if (nv != null && nv !== it.name){
        const err = FS.rename(it.path, nv);
        if (err){ notify('Finder', 'Could not rename: ' + err, ICONS.folder); Sfx.error(); }
        else {
          positions['fs:' + nv] = positions[it.id];
          delete positions[it.id];
          store('mkos.iconpos', positions);
        }
      }
      render();
    });
  }

  function select(id, elx){
    selected = id;
    root.querySelectorAll('.dicon').forEach(x => x.classList.remove('selected'));
    if (elx) elx.classList.add('selected');
  }

  function openItem(it){
    if (it.kind === 'app') launchApp(it.app);
    else if (it.kind === 'dir') FinderApp.openAt(it.path);
    else TextEditApp.open(it.path);
  }

  function newFolder(){
    const node = FS.get(dtPath);
    const name = FS.uniqueIn(node, 'untitled folder');
    FS.mk(dtPath + '/' + name, 'dir');
    renameTarget = name;
    selected = 'fs:' + name;
    render();
    notify('Finder', `New folder created on Desktop.`, ICONS.folder);
  }
  function newFile(){
    const node = FS.get(dtPath);
    const name = FS.uniqueIn(node, 'untitled.txt');
    FS.mk(dtPath + '/' + name, 'file');
    renameTarget = name;
    selected = 'fs:' + name;
    render();
    notify('Finder', `New file “${name}” created on Desktop.`, ICONS.file);
  }

  /* desktop background interactions */
  root.addEventListener('pointerdown', e => {
    if (e.target === root) select(null, null);
  });
  root.addEventListener('contextmenu', e => {
    if (e.target !== root) return;
    e.preventDefault();
    CtxMenu.show(e.clientX, e.clientY, [
      { label:'New Folder', action:newFolder },
      { label:'New File', action:newFile },
      '-',
      { label:'Change Wallpaper…', action:() => SettingsApp.open('wallpaper') },
      { label:'Next Wallpaper', action:() => SettingsApp.setWallpaper((settings.wallpaper + 1) % WALLPAPERS.length) },
      '-',
      { label:'Clean Up Icons', action:() => { positions = {}; store('mkos.iconpos', positions); render(); } },
      { label:'Open in Terminal', action:() => launchApp('terminal') },
    ]);
  });
  addEventListener('resize', render);
  FS.onChange(render);

  return { render, newFolder };
})();

/* ============================================================
   12. FINDER APP
   ============================================================ */
const FinderApp = (() => {
  const SIDEBAR = [
    { name:'Desktop',      path:HOME + '/Desktop',   icon:GLYPH.house },
    { name:'Documents',    path:HOME + '/Documents', icon:GLYPH.rows },
    { name:'Downloads',    path:HOME + '/Downloads', icon:GLYPH.fwd },
    { name:'guest',        path:HOME,                icon:GLYPH.house },
    { name:'Macintosh HD', path:'/',                 icon:GLYPH.hd },
    { name:'Trash',        path:'/Trash',            icon:GLYPH.trashSm },
  ];

  function open(startPath){
    const state = { cwd:null, hist:[], hi:-1, view:'icons', sel:null, renameTarget:null };

    /* toolbar (lives inside the titlebar) */
    const toolbar = el('div', '');
    toolbar.style.cssText = 'display:flex;align-items:center;gap:6px;flex:1;min-width:0';
    const bBack = el('button', 'tb-btn', GLYPH.back);
    const bFwd = el('button', 'tb-btn', GLYPH.fwd);
    const title = el('div', 'tb-title', '');
    title.style.marginLeft = '4px';
    const sp = el('div', 'tb-spacer');
    const bIcons = el('button', 'tb-btn', GLYPH.grid);
    const bList = el('button', 'tb-btn', GLYPH.rows);
    const bNew = el('button', 'tb-btn', GLYPH.newFolder);
    bBack.title = 'Back'; bFwd.title = 'Forward';
    bIcons.title = 'Icon view'; bList.title = 'List view'; bNew.title = 'New folder';
    toolbar.append(bBack, bFwd, title, sp, bIcons, bList, bNew);

    /* body */
    const side = el('div', 'fd-side', '<h4>Favorites</h4>');
    const main = el('div', 'fd-main');
    const scroll = el('div', 'fd-scroll');
    const status = el('div', 'fd-status');
    main.append(scroll, status);
    const body = el('div', '');
    body.style.cssText = 'display:flex;flex:1;min-width:0';
    body.append(side, main);

    SIDEBAR.forEach(s => {
      const it = el('div', 'fd-sitem');
      it.innerHTML = `<span style="color:var(--accent);display:flex">${s.icon}</span>`;
      it.append(document.createTextNode(s.name));
      it.dataset.path = s.path;
      it.addEventListener('click', () => nav(s.path));
      side.append(it);
    });

    const win = WM.create({
      app:'finder', title:'Finder', width:780, height:480, minW:520, minH:300,
      toolbar, content:body,
      onClose:() => unsub(),
    });
    const unsub = FS.onChange(() => {
      if (!FS.get(state.cwd)) nav(HOME, false);
      else refresh();
    });

    bBack.addEventListener('click', () => { if (state.hi > 0){ state.hi--; state.cwd = state.hist[state.hi]; refresh(); } });
    bFwd.addEventListener('click', () => { if (state.hi < state.hist.length - 1){ state.hi++; state.cwd = state.hist[state.hi]; refresh(); } });
    bIcons.addEventListener('click', () => { state.view = 'icons'; refresh(); });
    bList.addEventListener('click', () => { state.view = 'list'; refresh(); });
    bNew.addEventListener('click', () => newFolderHere());

    function nav(path, push = true){
      if (push){
        state.hist = state.hist.slice(0, state.hi + 1);
        state.hist.push(path);
        state.hi = state.hist.length - 1;
      }
      state.cwd = path;
      state.sel = null;
      refresh();
    }

    function displayName(path){
      if (path === '/') return 'Macintosh HD';
      const side = SIDEBAR.find(s => s.path === path);
      return side ? side.name : FS.baseName(path);
    }

    function newFolderHere(){
      const node = FS.get(state.cwd);
      if (!node) return;
      const name = FS.uniqueIn(node, 'untitled folder');
      FS.mk(state.cwd + '/' + name, 'dir');
      state.sel = name;
      state.renameTarget = name; // refresh() (via FS event) will start inline rename
      notify('Finder', 'New folder created.', ICONS.folder);
    }
    function newFileHere(){
      const node = FS.get(state.cwd);
      if (!node) return;
      const name = FS.uniqueIn(node, 'untitled.txt');
      FS.mk(state.cwd + '/' + name, 'file');
      state.sel = name;
      state.renameTarget = name;
      notify('Finder', `New file “${name}” created.`, ICONS.file);
    }
    function trashItem(name){
      const p = state.cwd + '/' + name;
      if (state.cwd === '/Trash' || state.cwd.startsWith('/Trash/')){
        FS.remove(p); Sfx.trash();
        notify('Finder', `“${name}” deleted permanently.`, ICONS.trash);
      } else {
        FS.move(p, '/Trash'); Sfx.trash();
        notify('Finder', `Moved “${name}” to Trash.`, ICONS.trash);
      }
    }
    function openEntry(n){
      if (n.type === 'dir') nav(state.cwd + '/' + n.name);
      else TextEditApp.open(state.cwd + '/' + n.name);
    }
    function itemMenu(e, n){
      e.preventDefault(); e.stopPropagation();
      state.sel = n.name; refresh();
      const inTrash = state.cwd === '/Trash' || state.cwd.startsWith('/Trash/');
      CtxMenu.show(e.clientX, e.clientY, [
        { label:'Open', action:() => openEntry(n) },
        '-',
        { label:'Rename', action:() => { state.renameTarget = n.name; refresh(); } },
        { label:inTrash ? 'Delete Immediately' : 'Move to Trash', danger:true, action:() => trashItem(n.name) },
      ]);
    }
    function bgMenu(e){
      e.preventDefault();
      CtxMenu.show(e.clientX, e.clientY, [
        { label:'New Folder', action:newFolderHere },
        { label:'New File', action:newFileHere },
        '-',
        { label:'View as Icons', action:() => { state.view = 'icons'; refresh(); } },
        { label:'View as List', action:() => { state.view = 'list'; refresh(); } },
      ]);
    }
    function maybeStartRename(labelEl, n){
      if (state.renameTarget !== n.name) return;
      state.renameTarget = null;
      startRename(labelEl, n.name, nv => {
        if (nv != null && nv !== n.name){
          const err = FS.rename(state.cwd + '/' + n.name, nv);
          if (err){ notify('Finder', 'Could not rename: ' + err, ICONS.folder); Sfx.error(); refresh(); }
          else state.sel = nv;
        } else refresh();
      });
    }

    function refresh(){
      const node = FS.get(state.cwd);
      if (!node) return;
      title.textContent = displayName(state.cwd);
      win.setTitle && win.setTitle(displayName(state.cwd));
      bBack.disabled = state.hi <= 0;
      bFwd.disabled = state.hi >= state.hist.length - 1;
      bIcons.classList.toggle('active', state.view === 'icons');
      bList.classList.toggle('active', state.view === 'list');
      side.querySelectorAll('.fd-sitem').forEach(s => s.classList.toggle('active', s.dataset.path === state.cwd));

      const entries = Object.values(node.children || {})
        .sort((a, b) => (a.type === b.type ? a.name.localeCompare(b.name) : a.type === 'dir' ? -1 : 1));

      scroll.innerHTML = '';
      scroll.oncontextmenu = bgMenu;
      scroll.onclick = e => { if (e.target === scroll || e.target.classList.contains('fd-grid')){ state.sel = null; refresh(); } };

      if (state.view === 'icons'){
        const grid = el('div', 'fd-grid');
        entries.forEach(n => {
          const it = el('div', 'fitem' + (state.sel === n.name ? ' selected' : ''));
          it.innerHTML = `<span class="fitem-img">${n.type === 'dir' ? ICONS.folder : ICONS.file}</span><span class="fitem-label"></span>`;
          const lab = it.querySelector('.fitem-label');
          lab.textContent = n.name;
          it.addEventListener('click', e => { e.stopPropagation(); state.sel = n.name; refresh(); });
          it.addEventListener('dblclick', () => openEntry(n));
          it.addEventListener('contextmenu', e => itemMenu(e, n));
          grid.append(it);
          maybeStartRename(lab, n);
        });
        scroll.append(grid);
      } else {
        const table = el('table', 'fd-list',
          '<thead><tr><th>Name</th><th>Kind</th><th>Size</th></tr></thead>');
        const tbody = el('tbody');
        entries.forEach(n => {
          const tr = el('tr', 'frow' + (state.sel === n.name ? ' selected' : ''));
          const kind = n.type === 'dir' ? 'Folder' : ((n.name.match(/\.([^.]+)$/) || [])[1] || 'Document').toUpperCase() + ' file';
          const count = n.type === 'dir' ? Object.keys(n.children).length : 0;
          const size = n.type === 'dir' ? `${count} item${count === 1 ? '' : 's'}` : `${(n.content || '').length} B`;
          tr.innerHTML = `<td><span class="fname">${n.type === 'dir' ? ICONS.folder : ICONS.file}<span class="lab"></span></span></td><td>${escHtml(kind)}</td><td>${escHtml(size)}</td>`;
          tr.querySelector('.lab').textContent = n.name;
          tr.addEventListener('click', e => { e.stopPropagation(); state.sel = n.name; refresh(); });
          tr.addEventListener('dblclick', () => openEntry(n));
          tr.addEventListener('contextmenu', e => itemMenu(e, n));
          tbody.append(tr);
          maybeStartRename(tr.querySelector('.lab'), n);
        });
        table.append(tbody);
        scroll.append(table);
      }
      status.textContent = `${entries.length} item${entries.length === 1 ? '' : 's'}`;
    }

    nav(startPath || HOME);
    return win;
  }

  /* Open a Finder window at a path, reusing one that's already there */
  function openAt(path){
    launchAppWindow('finder', () => open(path));
  }
  return { open, openAt };
})();

/* ============================================================
   13. TERMINAL APP
   ============================================================ */
const TerminalApp = (() => {
  function open(){
    const wrap = el('div', 'term');
    wrap.tabIndex = 0;
    const out = el('div', 't-out');
    const line = el('div', 't-line');
    const promptEl = el('span');
    const pre = el('span'), caret = el('span', 't-caret'), post = el('span');
    line.append(promptEl, pre, caret, post);
    wrap.append(out, line);

    const st = { cwd: HOME, buf:'', caretPos:0, hist:[], hi:0 };

    const shortPath = () => st.cwd === HOME ? '~' : (st.cwd.startsWith(HOME + '/') ? '~' + st.cwd.slice(HOME.length) : st.cwd);
    function renderPrompt(){
      promptEl.innerHTML = `<span class="t-user">guest@webos</span> <span class="t-path"></span> % `;
      promptEl.querySelector('.t-path').textContent = shortPath();
      pre.textContent = st.buf.slice(0, st.caretPos);
      post.textContent = st.buf.slice(st.caretPos);
      wrap.scrollTop = wrap.scrollHeight;
    }
    function print(text, cls){
      String(text).split('\n').forEach(lineTxt => {
        const d = el('div', 't-row' + (cls ? ' ' + cls : ''));
        d.textContent = lineTxt;
        out.append(d);
      });
      wrap.scrollTop = wrap.scrollHeight;
    }
    function printLs(node){
      const d = el('div', 't-row');
      Object.values(node.children)
        .sort((a, b) => a.name.localeCompare(b.name))
        .forEach(n => {
          const s = el('span', n.type === 'dir' ? 't-dir' : '');
          s.textContent = n.type === 'dir' ? n.name + '/' : n.name;
          d.append(s, document.createTextNode('   '));
        });
      out.append(d);
    }
    function echoCmdLine(){
      const d = el('div', 't-row');
      const u = el('span', 't-user'); u.textContent = 'guest@webos';
      const p = el('span', 't-path'); p.textContent = shortPath();
      d.append(u, document.createTextNode(' '), p, document.createTextNode(' % ' + st.buf));
      out.append(d);
    }

    function tokenize(s){
      const re = /"([^"]*)"|'([^']*)'|(\S+)/g;
      const o = []; let m;
      while ((m = re.exec(s))) o.push(m[1] != null ? m[1] : m[2] != null ? m[2] : m[3]);
      return o;
    }

    const HELP =
`Available commands:
  ls [path]              list directory contents
  cd [path]              change directory
  pwd                    print working directory
  mkdir <name…>          create folder(s)
  touch <name…>          create empty file(s)
  rm [-r] <name…>        remove files (folders need -r)
  cat <file>             print file contents
  echo <text> [> file]   print text, or write it to a file
  open [path]            open in Finder / TextEdit
  history                show command history
  clear                  clear the screen
  date                   show date and time
  whoami                 show current user
  help                   show this help`;

    function run(input){
      const args = tokenize(input);
      const cmd = args.shift();
      if (!cmd) return;
      switch (cmd){
        case 'help': print(HELP); break;
        case 'pwd': print(st.cwd); break;
        case 'whoami': print('guest'); break;
        case 'date': print(new Date().toString()); break;
        case 'clear': out.innerHTML = ''; break;
        case 'history': st.hist.forEach((h, i) => print(`  ${i + 1}  ${h}`)); break;
        case 'ls': {
          const p = FS.resolve(st.cwd, args[0] || '.');
          const n = FS.get(p);
          if (!n) print(`ls: ${args[0]}: No such file or directory`, 't-err');
          else if (n.type === 'file') print(n.name);
          else printLs(n);
          break;
        }
        case 'cd': {
          const p = FS.resolve(st.cwd, args[0] || '~');
          const n = FS.get(p);
          if (!n) print(`cd: no such file or directory: ${args[0]}`, 't-err');
          else if (n.type !== 'dir') print(`cd: not a directory: ${args[0]}`, 't-err');
          else st.cwd = p;
          break;
        }
        case 'mkdir': {
          if (!args.length){ print('usage: mkdir <name>', 't-err'); break; }
          args.forEach(a => {
            const err = FS.mk(FS.resolve(st.cwd, a), 'dir');
            if (err) print(`mkdir: ${err}`, 't-err');
          });
          break;
        }
        case 'touch': {
          if (!args.length){ print('usage: touch <name>', 't-err'); break; }
          args.forEach(a => {
            const p = FS.resolve(st.cwd, a);
            if (!FS.get(p)){
              const err = FS.mk(p, 'file');
              if (err) print(`touch: ${err}`, 't-err');
            }
          });
          break;
        }
        case 'rm': {
          const rec = args.includes('-r') || args.includes('-rf');
          const targets = args.filter(a => !a.startsWith('-'));
          if (!targets.length){ print('usage: rm [-r] <name>', 't-err'); break; }
          targets.forEach(a => {
            const p = FS.resolve(st.cwd, a);
            const n = FS.get(p);
            if (!n){ print(`rm: ${a}: No such file or directory`, 't-err'); return; }
            if (p === '/' || p === HOME){ print(`rm: ${a}: Operation not permitted`, 't-err'); return; }
            if (n.type === 'dir' && !rec){ print(`rm: ${a}: is a directory (use rm -r)`, 't-err'); return; }
            FS.remove(p);
          });
          break;
        }
        case 'cat': {
          if (!args.length){ print('usage: cat <file>', 't-err'); break; }
          const p = FS.resolve(st.cwd, args[0]);
          const n = FS.get(p);
          if (!n) print(`cat: ${args[0]}: No such file or directory`, 't-err');
          else if (n.type === 'dir') print(`cat: ${args[0]}: Is a directory`, 't-err');
          else print(n.content || '');
          break;
        }
        case 'echo': {
          const gi = args.findIndex(a => a === '>' || a === '>>');
          if (gi === -1){ print(args.join(' ')); break; }
          const text = args.slice(0, gi).join(' ');
          const file = args[gi + 1];
          if (!file){ print('echo: missing file name after ' + args[gi], 't-err'); break; }
          const p = FS.resolve(st.cwd, file);
          const existing = FS.get(p);
          const base = (args[gi] === '>>' && existing && existing.type === 'file' && existing.content) ? existing.content + '\n' : '';
          const err = FS.write(p, base + text);
          if (err) print(`echo: ${err}`, 't-err');
          break;
        }
        case 'open': {
          const p = FS.resolve(st.cwd, args[0] || '.');
          const n = FS.get(p);
          if (!n) print(`open: ${args[0]}: No such file or directory`, 't-err');
          else if (n.type === 'dir') FinderApp.openAt(p);
          else TextEditApp.open(p);
          break;
        }
        default:
          print(`zsh: command not found: ${cmd}`, 't-err');
      }
    }

    wrap.addEventListener('keydown', e => {
      if (e.metaKey) return;
      if (e.ctrlKey){
        if (e.key === 'c'){ echoCmdLine(); print('^C'); st.buf = ''; st.caretPos = 0; renderPrompt(); e.preventDefault(); }
        if (e.key === 'l'){ out.innerHTML = ''; renderPrompt(); e.preventDefault(); }
        return;
      }
      switch (e.key){
        case 'Enter': {
          echoCmdLine();
          const cmdline = st.buf.trim();
          st.buf = ''; st.caretPos = 0;
          if (cmdline){ st.hist.push(cmdline); run(cmdline); }
          st.hi = st.hist.length;
          renderPrompt();
          break;
        }
        case 'Backspace':
          if (st.caretPos > 0){ st.buf = st.buf.slice(0, st.caretPos - 1) + st.buf.slice(st.caretPos); st.caretPos--; renderPrompt(); }
          break;
        case 'Delete':
          st.buf = st.buf.slice(0, st.caretPos) + st.buf.slice(st.caretPos + 1); renderPrompt();
          break;
        case 'ArrowLeft': if (st.caretPos > 0){ st.caretPos--; renderPrompt(); } break;
        case 'ArrowRight': if (st.caretPos < st.buf.length){ st.caretPos++; renderPrompt(); } break;
        case 'Home': st.caretPos = 0; renderPrompt(); break;
        case 'End': st.caretPos = st.buf.length; renderPrompt(); break;
        case 'ArrowUp':
          if (st.hi > 0){ st.hi--; st.buf = st.hist[st.hi]; st.caretPos = st.buf.length; renderPrompt(); }
          break;
        case 'ArrowDown':
          if (st.hi < st.hist.length - 1){ st.hi++; st.buf = st.hist[st.hi]; }
          else { st.hi = st.hist.length; st.buf = ''; }
          st.caretPos = st.buf.length; renderPrompt();
          break;
        default:
          if (e.key.length === 1){ st.buf = st.buf.slice(0, st.caretPos) + e.key + st.buf.slice(st.caretPos); st.caretPos++; renderPrompt(); }
          else return;
      }
      e.preventDefault();
    });
    wrap.addEventListener('paste', e => {
      const t = (e.clipboardData || window.clipboardData).getData('text').replace(/\n/g, ' ');
      st.buf = st.buf.slice(0, st.caretPos) + t + st.buf.slice(st.caretPos);
      st.caretPos += t.length;
      renderPrompt();
      e.preventDefault();
    });
    wrap.addEventListener('focus', () => wrap.classList.add('focus'));
    wrap.addEventListener('blur', () => wrap.classList.remove('focus'));
    wrap.addEventListener('pointerup', () => wrap.focus());

    const win = WM.create({ app:'terminal', title:'guest — zsh — 80×24', width:620, height:400, minW:420, minH:240, content:wrap });
    print(`Last login: ${new Date().toLocaleString()} on console`);
    print(`Welcome to webOS zsh. Type "help" for commands.`);
    renderPrompt();
    setTimeout(() => wrap.focus(), 380);
    return win;
  }
  return { open };
})();

const BrowserApp = (() => {

  function pageHome(){

      </div>` };

  function pageSearch(q){

    if (q){

      const hits = SITE_INDEX.filter(s => (s.title + ' ' + s.words).toLowerCase().includes(ql));

    }
    return { title: q ? `${q} — WebSearch` : 'WebSearch', html:`
      <div class="bp">
        <h1 style="background:linear-gradient(90deg,var(--accent),#bf5af2);-webkit-background-clip:text;background-clip:text;color:transparent">WebSearch</h1>
        <input class="bsearch" value="${escHtml(q || '')}" placeholder="Search…">
        ${results || '<p style="margin-top:20px">Try searching for “music”, “apple” or “about”.</p>'}
      </div>` };
  }
  function pageAbout(){
    return { title:'About macOS Web', html:`
      <div class="bp">
        <h1>About macOS Web</h1>
        <p>A complete macOS-style desktop simulation in a single HTML file — no external assets, libraries or network access.</p>
        <h2>What's inside</h2>
        <p>• A window manager with dragging, resizing, traffic lights and minimize-to-dock<br>
           • A virtual file system shared by Finder, Terminal and the Desktop<br>
           • A terminal emulator with real commands and history<br>
           • A music player that synthesizes every note live with the Web Audio API<br>
           • Themes, wallpapers and accent colors in System Settings</p>
        <h2>Try this</h2>
        <p>Open Terminal and run <b>echo hello &gt; ~/Desktop/hi.txt</b> — then look at your desktop.</p>
        <p style="margin-top:26px;font-size:12px">Built with vanilla HTML, CSS and JavaScript.</p>
      </div>` };
  }
  function pageError(url){
    return { title:'Cannot connect', html:`
      <div class="bp"><div class="err-box">
        <div class="big">🌐</div>
        <h2 style="color:var(--text)">This browser can't connect to “${escHtml(url)}”</h2>
        <p>You're inside an offline simulation — only built-in pages load.</p>
        <p><span data-href="https://start.web/">Go to the start page</span></p>
      </div></div>` };
  }
  function route(url){
    let u;
    try { u = new URL(url); } catch(e){ return pageError(url); }
    const q = u.searchParams.get('q') || '';
    switch (u.hostname){
      case 'start.web': return pageHome();
      case 'search.web': return pageSearch(q);
      case 'about.web': return pageAbout();
      default: return pageError(u.hostname);
    }
  }
  function normalize(input){
    input = input.trim();
    if (!input) return 'https://start.web/';
    if (/^https?:\/\//i.test(input)) return input;
    if (/^[\w.-]+\.[a-z]{2,}(\/.*)?$/i.test(input)) return 'https://' + input;
    return 'https://search.web/?q=' + encodeURIComponent(input);
  }

  function open(startUrl){
    const st = { tabs:[], active:0 };

    /* toolbar */
    const toolbar = el('div', '');
    toolbar.style.cssText = 'display:flex;align-items:center;gap:6px;flex:1;min-width:0';
    const bBack = el('button', 'tb-btn', GLYPH.back);
    const bFwd = el('button', 'tb-btn', GLYPH.fwd);
    const bRel = el('button', 'tb-btn', GLYPH.reload);
    const addr = el('input', 'br-addr');
    addr.spellcheck = false;
    addr.placeholder = 'Search or enter website name';
    toolbar.append(bBack, bFwd, bRel, addr);

    /* body */
    const body = el('div', '');
    body.style.cssText = 'display:flex;flex-direction:column;flex:1;min-width:0';
    const tabstrip = el('div', 'br-tabs');
    const page = el('div', 'br-page');
    body.append(tabstrip, page);

    const win = WM.create({ app:'safari', title:'Safari', width:860, height:560, minW:480, minH:300, toolbar, content:body });

    const tab = () => st.tabs[st.active];

    function newTab(url){
      st.tabs.push({ hist:[], idx:-1, title:'New Tab' });
      st.active = st.tabs.length - 1;
      navigate(url || 'https://start.web/');
    }
    function closeTab(i){
      st.tabs.splice(i, 1);
      if (!st.tabs.length){ win.close(); return; }
      st.active = Math.min(st.active, st.tabs.length - 1);
      renderPage();
    }
    function navigate(url, push = true){
      const t = tab();
      if (push){
        t.hist = t.hist.slice(0, t.idx + 1);
        t.hist.push(url);
        t.idx = t.hist.length - 1;
      }
      renderPage();
    }
    function renderPage(){
      const t = tab();
      const url = t.hist[t.idx];
      const pg = route(url);
      t.title = pg.title;
      addr.value = url;
      page.innerHTML = pg.html;
      page.scrollTop = 0;
      bBack.disabled = t.idx <= 0;
      bFwd.disabled = t.idx >= t.hist.length - 1;
      renderTabs();
    }
    function renderTabs(){
      tabstrip.innerHTML = '';
      st.tabs.forEach((t, i) => {
        const tb = el('div', 'br-tab' + (i === st.active ? ' active' : ''));
        const lbl = el('span'); lbl.textContent = t.title;
        const x = el('button', 'x', '×');
        x.addEventListener('click', e => { e.stopPropagation(); closeTab(i); });
        tb.append(lbl, x);
        tb.addEventListener('click', () => { st.active = i; renderPage(); });
        tabstrip.append(tb);
      });
      const plus = el('button', 'br-newtab', '+');
      plus.title = 'New tab';
      plus.addEventListener('click', () => newTab());
      tabstrip.append(plus);
    }

    bBack.addEventListener('click', () => { const t = tab(); if (t.idx > 0){ t.idx--; renderPage(); } });
    bFwd.addEventListener('click', () => { const t = tab(); if (t.idx < t.hist.length - 1){ t.idx++; renderPage(); } });
    bRel.addEventListener('click', () => { Sfx.click(); renderPage(); });
    addr.addEventListener('keydown', e => {
      if (e.key === 'Enter'){ navigate(normalize(addr.value)); addr.blur(); }
    });
    addr.addEventListener('focus', () => addr.select());

    /* in-page link + search handling (delegated) */
    page.addEventListener('click', e => {
      const a = e.target.closest('[data-href]');
      if (a) navigate(a.dataset.href);
    });
    page.addEventListener('keydown', e => {
      if (e.key === 'Enter' && e.target.classList.contains('bsearch')){
        navigate('https://search.web/?q=' + encodeURIComponent(e.target.value));
      }
    });

    newTab(startUrl);
    return win;
  }

  return { open:(url) => launchAppWindow('safari', () => open(url)) };
})();

const NOTE_IDX = { C:0,'C#':1,Db:1,D:2,'D#':3,Eb:3,E:4,F:5,'F#':6,Gb:6,G:7,'G#':8,Ab:8,A:9,'A#':10,Bb:10,B:11 };
function noteFreq(n){
  const m = n.match(/^([A-G][#b]?)(\d)$/);
  const midi = (+m[2] + 1) * 12 + NOTE_IDX[m[1]];
  return 440 * Math.pow(2, (midi - 69) / 12);
}
/* Build a playable track from beat-based note tuples: [beat, note, lenBeats, wave?, vol?] */
function buildTrack(def){
  const spb = 60 / def.bpm;
  const events = def.notes
    .map(([b, n, d, w, v]) => ({ t: b * spb, f: noteFreq(n), d: Math.max(.06, d * spb), wave: w || def.wave, v: v != null ? v : .15 }))
    .sort((a, b) => a.t - b.t);
  const dur = events.reduce((m, e) => Math.max(m, e.t + e.d), 0) + .4;
  return { title: def.title, artist: def.artist, color: def.color, events, dur };
}

  /* — Track 4: upbeat chiptune — */
  {

    const mel = [[0,'E5',.5],[.5,'G5',.5],[1,'C6',1],[2,'G5',.5],[2.5,'E5',.5],[3,'G5',1],

const MusicApp = (() => {
  const LOOKAHEAD = .3, TICK_MS = 60;
  let bus = null, master = null, analyser = null;
  let cur = 0, playing = false, pos = 0, t0 = 0, evIdx = 0;
  let schedTimer = null, voices = [], volume = .7, seeking = false;
  let ui = null, rafId = 0;

  function graph(){
    const c = AudioHub.get();
    if (!bus){
      bus = c.createGain();
      master = c.createGain();
      master.gain.value = volume;
      analyser = c.createAnalyser();
      analyser.fftSize = 256;
      analyser.smoothingTimeConstant = .82;
      bus.connect(master); master.connect(analyser); analyser.connect(c.destination);
    }
    return c;
  }
  function scheduleNote(ev, when){
    const c = graph();
    const o = c.createOscillator(), g = c.createGain();
    o.type = ev.wave; o.frequency.value = ev.f;
    g.gain.setValueAtTime(0, when);
    g.gain.linearRampToValueAtTime(ev.v, when + .015);
    g.gain.exponentialRampToValueAtTime(.0001, when + ev.d);
    o.connect(g); g.connect(bus);
    o.start(when); o.stop(when + ev.d + .1);
    const voice = { o, g };
    voices.push(voice);
    o.onended = () => { const i = voices.indexOf(voice); if (i >= 0) voices.splice(i, 1); };
  }
  function stopVoices(){
    const c = graph();
    const now = c.currentTime;
    voices.forEach(v => {
      try {
        v.g.gain.cancelScheduledValues(now);
        v.g.gain.setTargetAtTime(0, now, .015);
        v.o.stop(now + .08);
      } catch(e){}
    });
    voices = [];
  }
  function firstEventAt(p){
    const evs = TRACKS[cur].events;
    let i = 0;
    while (i < evs.length && evs[i].t < p) i++;
    return i;
  }
  function tick(){
    const c = graph();
    const now = c.currentTime;
    const tr = TRACKS[cur];
    while (evIdx < tr.events.length && t0 + tr.events[evIdx].t <= now + LOOKAHEAD){
      const ev = tr.events[evIdx];
      if (t0 + ev.t >= now - .05) scheduleNote(ev, Math.max(now + .005, t0 + ev.t));
      evIdx++;
    }
    if (now - t0 >= tr.dur) next(true);
  }
  function play(){
    if (playing) return;
    const c = graph();
    playing = true;
    t0 = c.currentTime - pos;
    evIdx = firstEventAt(pos);
    schedTimer = setInterval(tick, TICK_MS);
    tick();
    syncUI();
  }
  function pause(){
    if (!playing) return;
    playing = false;
    pos = graph().currentTime - t0;
    clearInterval(schedTimer);
    stopVoices();
    syncUI();
  }
  function stop(){
    pause();
    pos = 0; evIdx = 0;
    syncUI();
  }
  function setTrack(i, keepPlaying){
    const was = playing || keepPlaying;
    if (playing) pause();
    cur = (i + TRACKS.length) % TRACKS.length;
    pos = 0; evIdx = 0;
    if (was) play(); else syncUI();
  }
  function next(auto){ setTrack(cur + 1, auto || playing); }
  function prev(){
    if (currentPos() > 3){ seekTo(0); }
    else setTrack(cur - 1, playing);
  }
  function seekTo(p){
    pos = clamp(p, 0, TRACKS[cur].dur);
    if (playing){
      stopVoices();
      t0 = graph().currentTime - pos;
      evIdx = firstEventAt(pos);
    }
    syncUI();
  }
  function currentPos(){
    return playing ? graph().currentTime - t0 : pos;
  }
  function setVolume(v){
    volume = v;
    if (master) master.gain.setTargetAtTime(v, graph().currentTime, .02);
  }
  const fmt = s => { s = Math.max(0, Math.floor(s)); return `${Math.floor(s / 60)}:${String(s % 60).padStart(2,'0')}`; };

  /* ---------- UI ---------- */
  function syncUI(){
    if (!ui) return;
    const tr = TRACKS[cur];
    ui.title.textContent = tr.title;
    ui.artist.textContent = tr.artist;
    ui.art.style.background = tr.color;
    ui.art.classList.toggle('spin', playing);
    ui.playBtn.innerHTML = playing ? GLYPH.pause : GLYPH.play;
    ui.seek.max = tr.dur;
    ui.list.querySelectorAll('.mu-trk').forEach((t, i) => t.classList.toggle('active', i === cur));
  }
  function uiLoop(){
    if (!ui) return;
    const tr = TRACKS[cur];
    const p = clamp(currentPos(), 0, tr.dur);
    if (!seeking){
      ui.seek.value = p;
      ui.tCur.textContent = fmt(p);
    }
    ui.tDur.textContent = fmt(tr.dur);
    /* visualizer */
    const ctx2d = ui.viz.getContext('2d');
    const W = ui.viz.width, H = ui.viz.height;
    ctx2d.clearRect(0, 0, W, H);
    if (analyser){
      const data = new Uint8Array(analyser.frequencyBinCount);
      analyser.getByteFrequencyData(data);
      const bars = 30, step = Math.floor(data.length / bars / 1.6);
      const accent = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim() || '#0a84ff';
      ctx2d.fillStyle = accent;
      for (let i = 0; i < bars; i++){
        const v = data[i * step] / 255;
        const h = Math.max(2, v * H);
        ctx2d.globalAlpha = .35 + v * .65;
        ctx2d.fillRect(i * (W / bars) + 1, H - h, W / bars - 3, h);
      }
      ctx2d.globalAlpha = 1;
    }
    rafId = requestAnimationFrame(uiLoop);
  }

  function open(){
    const body = el('div', 'mu');
    const side = el('div', 'mu-side', '<h4>Synth Library</h4>');
    const main = el('div', 'mu-main');
    body.append(side, main);

    const art = el('div', 'mu-art', ICONS.note);
    const title = el('div', 'mu-title');
    const artist = el('div', 'mu-artist');
    const viz = el('canvas');
    viz.id = 'mu-viz'; viz.width = 260; viz.height = 44;

    const seekRow = el('div', 'mu-seek');
    const tCur = el('span', '', '0:00');
    const seek = el('input');
    seek.type = 'range'; seek.min = 0; seek.step = .1; seek.value = 0;
    const tDur = el('span', '', '0:00');
    seekRow.append(tCur, seek, tDur);

    const ctl = el('div', 'mu-ctl');
    const bPrev = el('button', 'mu-btn', GLYPH.prev);
    const bPlay = el('button', 'mu-btn big', GLYPH.play);
    const bStop = el('button', 'mu-btn', GLYPH.stop);
    const bNext = el('button', 'mu-btn', GLYPH.next);
    ctl.append(bPrev, bPlay, bStop, bNext);

    const volRow = el('div', 'mu-vol');
    volRow.innerHTML = GLYPH.volOn;
    const vol = el('input');
    vol.type = 'range'; vol.min = 0; vol.max = 1; vol.step = .01; vol.value = volume;
    volRow.append(vol);

    main.append(art, title, artist, viz, seekRow, ctl, volRow);

    const list = side;
    TRACKS.forEach((tr, i) => {
      const item = el('div', 'mu-trk');
      item.innerHTML = `<span class="sw" style="background:${tr.color}">${ICONS.note}</span>
        <span class="ti"><b></b><i></i></span>`;
      item.querySelector('b').textContent = tr.title;
      item.querySelector('i').textContent = `${tr.artist} · ${fmt(tr.dur)}`;
      item.addEventListener('click', () => { setTrack(i, true); if (!playing) play(); });
      item.addEventListener('dblclick', () => { setTrack(i, true); });
      list.append(item);
    });

    bPlay.addEventListener('click', () => { playing ? pause() : play(); });
    bStop.addEventListener('click', stop);
    bNext.addEventListener('click', () => next(false));
    bPrev.addEventListener('click', prev);
    seek.addEventListener('pointerdown', () => { seeking = true; });
    seek.addEventListener('input', () => { tCur.textContent = fmt(+seek.value); });
    seek.addEventListener('change', () => { seekTo(+seek.value); seeking = false; });
    vol.addEventListener('input', () => setVolume(+vol.value));

    const win = WM.create({
      app:'music', title:'Music', width:640, height:430, minW:560, minH:380, content:body,
      onClose:() => { stop(); cancelAnimationFrame(rafId); ui = null; },
    });

    ui = { title, artist, art, viz, seek, tCur, tDur, playBtn:bPlay, list };
    syncUI();
    uiLoop();
    return win;
  }
  return { open };
})();

      sw.querySelector('input').addEventListener('change', e => setSound(e.target.checked));
      row.append(sw);
      const row2 = el('div', 'st-row');
      row2.append(el('div', 'st-label', '<b>Test</b><span>Play a sample notification sound.</span>'));
      const btn = el('button', 'st-btn', 'Play Sound');
      btn.addEventListener('click', () => settings.sound ? Sfx.notify() : notify('Sound', 'Interface sounds are off.', ICONS.settings));
      row2.append(btn);
      card.append(row, row2);
      mainEl.append(card);
    }
    else {
      mainEl.append(el('h2', '', 'About'));
      const card = el('div', 'st-card',
        `<div style="display:flex;gap:16px;align-items:center">
          <div style="width:52px;height:52px">${ICONS.about}</div>
          <div><b style="font-size:16px">macOS Web</b><br>
          <span style="font-size:12.5px;color:var(--text-sec)">Version 1.0 — a single-file desktop simulation.<br>
          Window manager · virtual FS · terminal · Web Audio synth.</span></div>
        </div>`);
      const card2 = el('div', 'st-card');
      const row = el('div', 'st-row');
      row.append(el('div', 'st-label', '<b>About This Mac</b><span>Open the classic about window.</span>'));
      const btn = el('button', 'st-btn', 'Open');
      btn.addEventListener('click', () => launchApp('about'));
      row.append(btn);
      card2.append(row);
      mainEl.append(card, card2);
    }
  }

  function open(startPane){
    if (startPane) pane = startPane;
    if (win && WM.winsOf('settings').includes(win)){
      win.focus(); renderPane(); return win;
    }
    const body = el('div', '');
    body.style.cssText = 'display:flex;flex:1;min-width:0';
    sideEl = el('div', 'st-side');
    PANES.forEach(p => {
      const it = el('div', 'st-sitem');
      it.dataset.pane = p.id;
      it.innerHTML = `<span class="st-ico" style="background:${p.color}">${p.glyph}</span>`;
      it.append(document.createTextNode(p.name));
      it.addEventListener('click', () => { pane = p.id; renderPane(); });
      sideEl.append(it);
    });
    mainEl = el('div', 'st-main');
    body.append(sideEl, mainEl);
    win = WM.create({
      app:'settings', title:'System Settings', width:700, height:460, minW:560, minH:340, content:body,
      onClose:() => { win = null; mainEl = null; sideEl = null; },
    });
    renderPane();
    return win;
  }

  return { open, setTheme, setAccent, setWallpaper, setSound };
})();

/* ============================================================
   17. TEXTEDIT + ABOUT
   ============================================================ */
const TextEditApp = (() => {
  const openWins = new Map(); // path -> win
  function open(path){
    if (openWins.has(path)){ openWins.get(path).focus(); return openWins.get(path); }
    const node = FS.get(path);
    if (!node || node.type !== 'file'){ notify('TextEdit', 'Could not open file.', ICONS.textedit); return null; }
    const ta = el('textarea', 'textedit');
    ta.value = node.content || '';
    ta.spellcheck = false;
    let deb = null;
    ta.addEventListener('input', () => {
      clearTimeout(deb);
      deb = setTimeout(() => FS.write(path, ta.value), 350);
    });
    const wasRunning = WM.winsOf('textedit').length > 0;
    const win = WM.create({
      app:'textedit', title:FS.baseName(path), width:560, height:420, minW:360, minH:240, content:ta,
      onClose:() => openWins.delete(path),
    });
    openWins.set(path, win);
    if (!wasRunning){ Dock.bounce('textedit'); notify('TextEdit', 'TextEdit is now open.', ICONS.textedit); }
    setTimeout(() => ta.focus(), 380);
    return win;
  }
  return { open };
})();

const AboutApp = (() => {
  function open(){
    const body = el('div', 'about',
      `${GLYPH.apple}
       <h2>macOS Web</h2>
       <div class="ver">Version 1.0 (Single File)</div>
       <table>
         <tr><td>Chip</td><td>Browser Engine Pro</td></tr>
         <tr><td>Memory</td><td>One HTML file</td></tr>
         <tr><td>Audio</td><td>Web Audio oscillators</td></tr>
         <tr><td>Storage</td><td>In-memory virtual FS</td></tr>
         <tr><td>Serial</td><td>C02-WEB-SIM-2026</td></tr>
       </table>`);
    return WM.create({ app:'about', title:'About This Mac', width:330, height:330, fixed:true, content:body });
  }
  return { open };
})();

/* ---------- Web apps — the user's live Vercel sites, each in its own window ----------
   This is the App Store catalog. Installing an app (GET) puts its shortcut on the
   desktop; from there it can be dragged onto the Dock to pin it. Installed apps
   are persisted in localStorage ('mkos.installed').                               */
const WEB_APPS = [
  { id:'titanstats',   name:'Titan Stats',        icon:'titan',        url:'https://titan-stats.vercel.app/',       winTitle:'Titan PreStocks · Hacim Analizi',
    desc:'Live volume analytics for Titan PreStocks tokens.' },
  { id:'btccycle',     name:'BTC Cycle',          icon:'btccycle',     url:'https://btc-cycle-tracker.vercel.app/', winTitle:'BTC Cycle Forecast',
    desc:'Bitcoin cycle forecast with halving-based projections.' },
  { id:'cointerminal', name:'Coin Terminal',      icon:'cointerminal', url:'https://coin-terminal.vercel.app/',     winTitle:'◈ COIN TERMINAL',
    desc:'A retro terminal-style crypto market dashboard.' },
  { id:'xstocks',      name:'xStocks Panel',      icon:'xstocks',      url:'https://xstocks-dashboard-ruby.vercel.app/', winTitle:'xStocks Panel',
    desc:'xPoints dashboard for the xStocks ecosystem.' },
];

/* ---------- install state (drives which web apps appear on the desktop) ---------- */
/* nothing is installed by default — the user installs apps from the App Store */
let installedApps = loadLS('mkos.installed', [])
  .filter(id => WEB_APPS.some(d => d.id === id));
function isInstalled(id){ return installedApps.includes(id); }
function installApp(id){
  if (isInstalled(id) || !APPS[id]) return;
  installedApps.push(id);
  store('mkos.installed', installedApps);
  Desktop.render();
  notify('App Store', `${APPS[id].name} installed — its icon is on the desktop.`, APPS[id].icon);
}
function uninstallApp(id){
  if (!isInstalled(id)) return;
  installedApps = installedApps.filter(x => x !== id);
  store('mkos.installed', installedApps);
  WM.closeAllOf(id);
  if (Dock.isUserPin(id)) Dock.unpin(id);
  Desktop.render();
  notify('App Store', `${APPS[id].name} uninstalled.`, APPS[id].icon);
}
function makeWebAppOpener(def){
  return function(){
    const wrap = el('div', 'webview-wrap');
    const frame = el('iframe', 'webview');
    frame.src = def.url;
    const loading = el('div', 'webview-loading',
      `<div class="spinner"></div><span>${escHtml(new URL(def.url).hostname)} yükleniyor…</span>`);
    frame.addEventListener('load', () => loading.remove());
    wrap.append(frame, loading);

    const toolbar = el('div', '');
    toolbar.style.cssText = 'display:flex;align-items:center;gap:6px;flex:1;min-width:0';
    const title = el('div', 'tb-title');
    title.textContent = def.winTitle || def.name;
    const sp = el('div', 'tb-spacer');
    const bRel = el('button', 'tb-btn', GLYPH.reload);
    bRel.title = 'Yenile';
    bRel.addEventListener('click', () => { wrap.append(loading); frame.src = def.url; });
    const bExt = el('button', 'tb-btn', GLYPH.ext);
    bExt.title = 'Gerçek tarayıcıda aç';
    bExt.addEventListener('click', () => window.open(def.url, '_blank'));
    toolbar.append(title, sp, bRel, bExt);

    return WM.create({ app:def.id, title:def.name, width:980, height:640, minW:420, minH:320, toolbar, content:wrap });
  };
}

/* ---------- App Store — install / open / uninstall the user's web apps ---------- */
const AppStoreApp = (() => {
  let mainEl = null;
  const installing = new Set();

  function card(d){
    const c = el('div', 'as-card');
    c.innerHTML = `<span class="as-ico">${ICONS[d.icon]}</span>
      <span class="as-info"><b></b><i>Web App</i><p></p></span>`;
    c.querySelector('b').textContent = d.name;
    c.querySelector('p').textContent = d.desc || '';
    const right = el('div', 'as-right');
    const btn = el('button', 'as-btn');
    right.append(btn);
    if (installing.has(d.id)){
      btn.innerHTML = '<span class="spinner spinner-sm"></span>';
      btn.disabled = true;
    } else if (isInstalled(d.id)){
      btn.textContent = 'OPEN';
      btn.addEventListener('click', () => launchApp(d.id));
      const un = el('button', 'as-un', 'Uninstall');
      un.addEventListener('click', () => { uninstallApp(d.id); render(); });
      right.append(un);
    } else {
      btn.textContent = 'GET';
      btn.addEventListener('click', () => {
        Sfx.click();
        installing.add(d.id);
        render();
        setTimeout(() => { installing.delete(d.id); installApp(d.id); render(); }, 1200 + Math.random() * 900);
      });
    }
    c.append(right);
    return c;
  }

  function render(){
    if (!mainEl) return;
    mainEl.innerHTML = '';
    WEB_APPS.forEach(d => mainEl.append(card(d)));
  }

  function open(){
    const main = el('div', 'as-main');
    mainEl = main;
    const win = WM.create({
      app:'appstore', title:'App Store', width:620, height:540, minW:460, minH:340, content:main,
      onClose:() => { mainEl = null; },
    });
    render();
    return win;
  }
  return { open };
})();

/* ============================================================
   18. APP REGISTRY & LAUNCHING
   ============================================================ */
const APPS = {
  finder:   { name:'Finder',          icon:ICONS.finder,   launch:a => FinderApp.open(a && a.path) },
  terminal: { name:'Terminal',        icon:ICONS.terminal, single:true, launch:() => TerminalApp.open() },
  safari:   { name:'Safari',          icon:ICONS.safari,   single:true, launch:() => BrowserApp.open() },
  music:    { name:'Music',           icon:ICONS.music,    single:true, launch:() => MusicApp.open() },
  settings: { name:'System Settings', icon:ICONS.settings, single:true, launch:a => SettingsApp.open(a && a.pane) },
  appstore: { name:'App Store',       icon:ICONS.appstore, single:true, launch:() => AppStoreApp.open() },
  textedit: { name:'TextEdit',        icon:ICONS.textedit, launch:() => null },
  about:    { name:'About This Mac',  icon:ICONS.about,    single:true, launch:() => AboutApp.open() },
};
/* register the user's live web apps */
WEB_APPS.forEach(d => {
  APPS[d.id] = { name:d.name, icon:ICONS[d.icon], single:true, launch:makeWebAppOpener(d) };
});

function launchApp(id, args){
  const app = APPS[id];
  if (!app) return;
  if (app.single){
    const ws = WM.winsOf(id);
    if (ws.length){ ws[0].minimized ? WM.restore(ws[0]) : WM.focus(ws[0]);
      if (id === 'settings' && args && args.pane) SettingsApp.open(args.pane);
      return ws[0];
    }
  }
  const wasRunning = WM.winsOf(id).length > 0;
  const w = app.launch(args);
  if (w){
    Dock.bounce(id);
    if (!wasRunning) notify(app.name, `${app.name} is now open.`, app.icon);
  }
  return w;
}
/* Open a specific window of an app (used by FinderApp.openAt / BrowserApp.open(url)) */
function launchAppWindow(id, maker){
  const app = APPS[id];
  const wasRunning = WM.winsOf(id).length > 0;
  const w = maker();
  if (w){
    Dock.bounce(id);
    if (!wasRunning) notify(app.name, `${app.name} is now open.`, app.icon);
  }
  return w;
}

/* For the browser, single-instance means: focus the window and open url in new context */
/* (BrowserApp handles its own reuse through launchAppWindow above.) */

/* ============================================================
   19. BOOT SEQUENCE & INIT
   ============================================================ */
function runBoot(){
  const fill = $('#boot-fill');
  let p = 0;
  const step = () => {
    p += 5 + Math.random() * 13;
    if (p >= 100){
      fill.style.width = '100%';
      setTimeout(finishBoot, 450);
    } else {
      fill.style.width = p + '%';
      setTimeout(step, 110 + Math.random() * 190);
    }
  };
  setTimeout(step, 700);
}
function finishBoot(){
  $('#boot').classList.add('done');
  document.body.classList.add('on');
  setTimeout(() => { $('#boot').style.display = 'none'; }, 900);
  setTimeout(() => {
    notify('Welcome to macOS Web', 'Tip: open Terminal in the Dock and type "help".', GLYPH.apple.replace('<svg', `<svg fill="${settings.theme === 'dark' ? '#fff' : '#1d1d1f'}"`));
  }, 1400);
}

function init(){
  applyAllSettings();
  MenuBar.build();
  Dock.build();
  Desktop.render();
  runBoot();
}
init();
</script>
